let _audioCtx=null;
const getAudioCtx=()=>{
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return null;
  if(!_audioCtx)_audioCtx=new AC();
  if(_audioCtx.state==="suspended")_audioCtx.resume();
  return _audioCtx;
};
const beep=type=>{
  try{
    const ctx=getAudioCtx();if(!ctx)return;
    const notes=type==="ready"?[[523,0,0.3],[659,0.13,0.3],[784,0.26,0.4]]:[[440,0,0.25],[440,0.15,0.2]];
    notes.forEach(([f,d,vol])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type=type==="ready"?"sine":"triangle";
      o.frequency.setValueAtTime(f,ctx.currentTime+d);
      g.gain.setValueAtTime(vol,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.4);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.45);
    });
  }catch(e){console.warn("Audio error:",e);}
};

const fmtDate=s=>{if(!s)return"";const d=new Date(s);if(isNaN(d))return s;const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());const yest=new Date(+today-86400000);const dd=new Date(d.getFullYear(),d.getMonth(),d.getDate());const t=d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).toLowerCase();if(+dd===+today)return"Today "+t;if(+dd===+yest)return"Yesterday "+t;return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+t;};

const fmtTravelDate=s=>{
  if(!s)return"";
  // Handle ISO format 2026-04-01
  const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(iso)return iso[2]+"/"+iso[3]+"/"+iso[1].slice(2);
  // Already in mm/dd or mm/dd/yy format - return as-is
  return s;
};

const mapRec=rec=>{
  const f=rec.fields;
  const ar=(typeof f["Assignee"]==="object"?f["Assignee"]&&f["Assignee"].name:f["Assignee"])||"";
  const assignee=ar.toLowerCase().includes("newanda")?"newanda":ar.toLowerCase().includes("victor")?"victor":"victor";

  const category=["quote","inquiry","operations","priority"].includes(cat)?cat:"quote";

  const flags=flagsRaw?flagsRaw.split(/[,\n]/).map(s=>s.trim()).filter(Boolean):[];
  const pickup=f["Pickup Location"]||"",dropoff=f["Dropoff Location"]||"";
  const route=pickup&&dropoff?pickup+" to "+dropoff:pickup||dropoff||"";

};

const fetchAll=async()=>{
  let records=[],offset=null;
  do{
    const url=new URL("https://api.airtable.com/v0/"+AIRTABLE_BASE_ID+"/"+encodeURIComponent(AIRTABLE_TABLE));
    url.searchParams.set("pageSize","100");url.searchParams.set("sort[0][field]","Received At");url.searchParams.set("sort[0][direction]","desc");
    if(offset)url.searchParams.set("offset",offset);
    const res=await fetch(url.toString(),{headers:{Authorization:"Bearer "+getToken()}});
    if(!res.ok){const e=await res.json();throw new Error(e&&e.error&&e.error.message||"Error "+res.status);}
    const json=await res.json();records=[...records,...(json.records||[])];offset=json.offset||null;
  }while(offset);
  return records.map(mapRec);
};

const STATUS_TO_AIRTABLE={
  "new":"New","awaiting":"Awaiting Info","replied":"Reply Sent",
  "ready":"Ready to Quote","sent":"Quote Sent",
  "unqualified":"Not Qualified","spam":"Spam","forwarded":"Forwarded"
};

const patchStatus=async(recId,statusKey)=>{
  const val=STATUS_TO_AIRTABLE[statusKey];
  if(!val)return;
  await fetch("https://api.airtable.com/v0/"+AIRTABLE_BASE_ID+"/"+encodeURIComponent(AIRTABLE_TABLE)+"/"+recId,{
    method:"PATCH",
    headers:{"Authorization":"Bearer "+getToken(),"Content-Type":"application/json"},
    body:JSON.stringify({fields:{"Status":val}})
  });
};

}

function PinScreen({onUnlock}){
  const [pin,setPin]=useState("");const [shake,setShake]=useState(false);const [err,setErr]=useState(false);
  const tryPin=v=>{if(v===ACCESS_PIN){sessionStorage.setItem("ecl_auth","1");onUnlock();}else if(v.length===ACCESS_PIN.length){setShake(true);setErr(true);setTimeout(()=>{setShake(false);setErr(false);setPin("");},650);}};
  const tap=k=>{if(!k)return;if(k==="DEL"){setPin(p=>p.slice(0,-1));return;}const n=pin+k;setPin(n);tryPin(n);};
  useEffect(()=>{
    const handler=e=>{
      if(e.key>="0"&&e.key<="9")tap(e.key);
      else if(e.key==="Backspace")tap("DEL");
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  },[pin]);
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div className="fade-in" style={{textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:13,background:"#a8621a",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:20,margin:"0 auto 14px",boxShadow:"0 4px 18px rgba(196,125,43,0.35)"}}>EC</div>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Charter Email Inbox</div>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:28}}>Empire Coach Line</div>
        <div style={{background:"var(--surface)",borderRadius:16,padding:"24px 32px",boxShadow:"var(--shadow-md)",width:280}}>
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:18}}>Enter your PIN</div>
          <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:22,animation:shake?"shake 0.35s ease":"none"}}>
            {[0,1,2,3].map(i=>(
              <div key={i} style={{width:11,height:11,borderRadius:"50%",background:i<pin.length?(err?"var(--red)":"#c47d2b"):"var(--border2)",transition:"all 0.15s"}}/>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
            {["1","2","3","4","5","6","7","8","9","","0","DEL"].map((k,i)=>(
              <button key={i} onClick={()=>tap(k)} disabled={!k}
                style={{background:k==="DEL"?"var(--surface2)":k?"var(--surface)":"transparent",border:k?"1px solid var(--border2)":"none",borderRadius:8,padding:"13px 0",color:k==="DEL"?"var(--text2)":"var(--text)",fontSize:k==="DEL"?12:17,fontWeight:600,cursor:k?"pointer":"default"}}>
                {k}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

    setLoading(true);setError(null);
    try{
      const recs=useSample?SAMPLE_DATA:await fetchAll();
      if(sound&&prev.current.length){
        recs.forEach(r=>{
          const old=prev.current.find(o=>o.id===r.id);
          if(r.status==="ready"&&(!old||old.status!=="ready"))beep("ready");
          else if(r.status==="new"&&!old)beep("new");
        });
      }
      // Preserve any pending status changes not yet confirmed by Airtable
      const merged=recs.map(r=>{
        const pending=pendingUpdates.current[r.id];
        return pending?{...r,status:pending}:r;
      });
      prev.current=merged;setData(merged);setLastFetched(new Date());
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[sound]);

  useEffect(()=>{load();},[]);
  useEffect(()=>{const i=setInterval(load,60000);return()=>clearInterval(i);},[load]);

  const pickRep=id=>{saveRepS(id);setCurrentRep(id);setShowRepMenu(false);};
  const pendingUpdates=useRef({});
  const updateStatus=(id,val)=>{
    setData(p=>p.map(r=>r.id===id?{...r,status:val}:r));
    if(CLOSED.includes(val))setSelected(null);
    pendingUpdates.current[id]=val;
    patchStatus(id,val).catch(e=>console.error("Patch failed:",e));
  };

  const repObj=getRep(currentRep);
  const byRep=currentRep==="all"?data:data.filter(r=>r.assignee===currentRep);
  const unassigned=currentRep!=="all"?data.filter(r=>(!r.assignee||r.assignee==="")&&!CLOSED.includes(r.status)):[];

  const filtered=byRep.filter(r=>{
    if(tab==="action"){if(!NEEDS.includes(r.status)||CLOSED.includes(r.status))return false;}
    else if(tab==="closed"){if(!CLOSED.includes(r.status))return false;}
    else{if(CLOSED.includes(r.status))return false;}
    if(statusFilter&&r.status!==statusFilter)return false;
    if(search){const q=search.toLowerCase();if(!(r.customer||"").toLowerCase().includes(q)&&!(r.school||"").toLowerCase().includes(q)&&!(r.route||"").toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>{
    if(tab==="action"){
      // Sort by travel date ascending — soonest trip first
      const ord={new:0,ready:1,awaiting:2,replied:3};
      const ao=ord[a.status]!=null?ord[a.status]:9,bo=ord[b.status]!=null?ord[b.status]:9;
      if(ao!==bo)return ao-bo;
      if(a.date&&b.date)return a.date.localeCompare(b.date);
      if(a.date)return -1;if(b.date)return 1;
      return (a.receivedRaw||"").localeCompare(b.receivedRaw||"");
    }
    if(tab==="closed"){
      // Most recently closed first
      return (b.receivedRaw||"").localeCompare(a.receivedRaw||"");
    }
    // All Open — oldest email first (most overdue at top)
    return (a.receivedRaw||"").localeCompare(b.receivedRaw||"");
  });

  const c={
    action:byRep.filter(r=>NEEDS.includes(r.status)&&!CLOSED.includes(r.status)).length,
    all:byRep.filter(r=>!CLOSED.includes(r.status)).length,
    closed:byRep.filter(r=>CLOSED.includes(r.status)).length,
    ready:byRep.filter(r=>r.status==="ready").length,
    awaiting:byRep.filter(r=>r.status==="awaiting").length,
    new:byRep.filter(r=>r.status==="new").length,
  };

  return(
    <div style={{height:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {error&&!loading&&(
        <div style={{background:"var(--red-bg)",borderBottom:"1px solid var(--red-border)",padding:"8px 18px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:12,color:"var(--red)",fontWeight:600}}>Could not load data:</span>
          <span style={{fontSize:12,color:"var(--red)",flex:1}}>{error}</span>
          <button onClick={()=>{localStorage.removeItem("ecl_at_token");sessionStorage.removeItem("ecl_auth");window.location.reload();}} style={{background:"var(--red)",border:"none",borderRadius:5,padding:"3px 10px",color:"#fff",fontSize:11,cursor:"pointer",fontWeight:600}}>Re-enter Token</button>
          <button onClick={load} style={{background:"var(--surface)",border:"1px solid var(--red-border)",borderRadius:5,padding:"3px 10px",color:"var(--red)",fontSize:11,cursor:"pointer"}}>Retry</button>
        </div>
      )}

      {showRepMenu&&(
        <div style={{position:"fixed",inset:0,background:"rgba(28,25,23,0.45)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div className="fade-in" style={{background:"var(--surface)",borderRadius:16,padding:36,width:340,boxShadow:"var(--shadow-lg)",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:700,marginBottom:6}}>Who are you?</div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:22,lineHeight:1.6}}>We will remember and filter your queue automatically.</div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {REPS.filter(r=>r.id!=="all").map(r=>(
                <button key={r.id} onClick={()=>pickRep(r.id)}
                  style={{background:r.color,border:"none",borderRadius:10,padding:"13px 20px",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span>{r.name}</span>
                  <span style={{background:"rgba(255,255,255,0.22)",borderRadius:7,padding:"2px 9px",fontSize:11,fontWeight:500}}>{data.filter(x=>x.assignee===r.id&&!CLOSED.includes(x.status)).length} open</span>
                </button>
              ))}
              <button onClick={()=>pickRep("all")} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 20px",color:"var(--text2)",fontSize:13,fontWeight:500,cursor:"pointer"}}>View All Reps</button>
            </div>
          </div>
        </div>
      )}

      {/* Top bar */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 18px",height:50,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{width:28,height:28,borderRadius:7,background:"#a8621a",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:11,flexShrink:0}}>EC</div>
        <span style={{fontSize:14,fontWeight:700,letterSpacing:"-0.01em",marginRight:4}}>Charter Email Inbox</span>
        <div style={{height:16,width:1,background:"var(--border)",flexShrink:0}}/>
        <div style={{display:"flex",alignItems:"center",gap:6,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:"3px 4px 3px 9px"}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:repObj.color,flexShrink:0}}/>
          <span style={{fontSize:12,fontWeight:600,color:repObj.color}}>{repObj.name}</span>
          <button onClick={()=>setShowRepMenu(true)} style={{background:"var(--border2)",border:"none",borderRadius:4,padding:"2px 7px",fontSize:10,color:"var(--text2)",cursor:"pointer",marginLeft:2}}>switch</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,marginLeft:2}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:error?"var(--red)":"var(--green)",animation:loading?"pulse 1s ease infinite":"none"}}/>
          <span style={{fontSize:11,color:"var(--text3)"}}>{loading?"syncing...":error?"error":lastFetched?"updated "+lastFetched.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).toLowerCase():""}</span>
        </div>
        <div style={{flex:1}}/>
        <div style={{display:"flex",gap:5}}>
          <button onClick={load} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px",fontSize:11,color:"var(--text2)",cursor:"pointer"}}>Refresh</button>

            const url="https://api.airtable.com/v0/"+AIRTABLE_BASE_ID+"/"+encodeURIComponent(AIRTABLE_TABLE)+"?pageSize=1";
            try{
              const res=await fetch(url,{headers:{Authorization:"Bearer "+getToken()}});
              const json=await res.json();
              if(res.ok){alert("Connection OK! Found "+( json.records?json.records.length:"?")+" record(s) on this page. Total fields: "+Object.keys((json.records&&json.records[0]&&json.records[0].fields)||{}).join(", "));}
              else{alert("Airtable error "+res.status+": "+(json.error&&json.error.message||JSON.stringify(json)));}
            }catch(e){alert("Network error: "+e.message);}
          }} style={{background:"var(--blue-bg)",border:"1px solid var(--blue-border)",borderRadius:6,padding:"4px 10px",fontSize:11,color:"var(--blue)",cursor:"pointer",fontWeight:600}}>Test Token</button>
          <button onClick={()=>setSound(s=>!s)} style={{background:sound?"var(--green-bg)":"var(--surface2)",border:"1px solid "+(sound?"var(--green-border)":"var(--border)"),borderRadius:6,padding:"4px 10px",fontSize:11,color:sound?"var(--green)":"var(--text2)",cursor:"pointer"}}>{sound?"🔔 Sound On":"🔕 Sound Off"}</button>
          <button onClick={()=>beep("ready")} title="Test sound" style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px",fontSize:11,color:"var(--text3)",cursor:"pointer"}}>▶ Test</button>
          <button onClick={()=>{sessionStorage.removeItem("ecl_auth");window.location.reload();}} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px",fontSize:11,color:"var(--text2)",cursor:"pointer"}}>Lock</button>
          <button onClick={()=>{localStorage.removeItem("ecl_at_token");sessionStorage.removeItem("ecl_auth");window.location.reload();}} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px",fontSize:11,color:"var(--text3)",cursor:"pointer"}}>Reset</button>
        </div>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

              {key:"new",label:"New",count:c.new,color:"var(--blue)",bg:"var(--blue-bg)",border:"var(--blue-border)"},

                </button>
              );

          <div style={{padding:"0 14px 8px",display:"flex",gap:3}}>
            {[{k:"action",label:"Needs Action",cnt:c.action},{k:"all",label:"All Open",cnt:c.all},{k:"closed",label:"Closed",cnt:c.closed}].map(t=>{
              const isOn=tab===t.k;
              return(
                <button key={t.k} onClick={()=>setTab(t.k)}

                  {t.k==="action"&&<span style={{width:6,height:6,borderRadius:"50%",background:c.action>0?"var(--amber)":"var(--border)",display:"inline-block",flexShrink:0}}/>}
                  {t.label}
                  {t.cnt!=null&&t.cnt>0&&<span style={{fontSize:11,color:isOn?"var(--text2)":"var(--text3)",marginLeft:1}}>{t.cnt}</span>}
                </button>
              );
            })}
          </div>

          {/* Search */}
          <div style={{padding:"0 14px 8px"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search customer, school, route..."
              style={{width:"100%",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:7,padding:"7px 11px",fontSize:12,color:"var(--text)",outline:"none"}}/>
          </div>

          {/* List */}
          <div style={{flex:1,overflowY:"auto",padding:"0 10px 14px"}}>
            {/* Unassigned banner */}
            {currentRep!=="all"&&tab!=="closed"&&unassigned.length>0&&(
              <div style={{marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 4px",marginBottom:6}}>
                  <div style={{flex:1,height:1,background:"var(--red-border)"}}/>
                  <span style={{fontSize:10,fontWeight:700,color:"var(--red)",textTransform:"uppercase",letterSpacing:"0.06em",whiteSpace:"nowrap"}}>&#9888; Unassigned — needs attention</span>
                  <div style={{flex:1,height:1,background:"var(--red-border)"}}/>
                </div>
                {unassigned.filter(r=>{
                  if(statusFilter&&r.status!==statusFilter)return false;
                  if(search){const q=search.toLowerCase();if(!(r.customer||"").toLowerCase().includes(q)&&!(r.school||"").toLowerCase().includes(q))return false;}
                  return true;
                }).map(r=>{
                  const cc=CAT[r.category]||CAT.quote;
                  const st=STATUS[r.status]||STATUS.new;
                  const isSel=selected===r.id;
                  const days=daysUntil(r.date);
                  const urgent=days!=null&&days>=0&&days<=3;
                  return(
                    <div key={r.id} onClick={()=>setSelected(isSel?null:r.id)}
                      style={{display:"flex",background:isSel?"var(--red-bg)":"#fff8f8",border:"1px solid var(--red-border)",borderRadius:9,marginBottom:5,cursor:"pointer",overflow:"hidden",transition:"all 0.1s",boxShadow:isSel?"none":"var(--shadow)"}}>
                      <div style={{width:3,background:"var(--red)",flexShrink:0}}/>
                      <div style={{flex:1,padding:"11px 12px",minWidth:0}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                          <div style={{minWidth:0}}>
                            <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.customer}</div>
                            <div style={{fontSize:11,color:"var(--text3)",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.school||r.contact}</div>
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <div style={{fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{r.received}</div>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap",alignItems:"center"}}>
                          <span style={{fontSize:10,fontWeight:700,color:"var(--red)",background:"var(--red-bg)",borderRadius:4,padding:"2px 6px",border:"1px solid var(--red-border)"}}>Unassigned</span>
                          <span style={{fontSize:10,fontWeight:600,color:st.color,background:st.bg,borderRadius:4,padding:"2px 6px"}}>{st.label}</span>
                          <span style={{fontSize:10,color:cc.color,background:cc.bg,borderRadius:4,padding:"2px 6px",fontWeight:500}}>{cc.label}</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:10,marginTop:5,flexWrap:"wrap"}}>
                          {r.date&&<div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                            <span style={{fontSize:11,fontWeight:700,color:urgent?"var(--red)":"var(--text2)"}}>&#128197; {fmtTravelDate(r.date)}</span>
                            {days!=null&&days>=0&&days<=7&&<span style={{fontSize:10,color:urgent?"var(--red)":"var(--amber)",fontWeight:700}}>{days===0?"· Today":days===1?"· Tomorrow":"· "+days+" days"}</span>}
                          </div>}
                          {r.route&&<div style={{fontSize:11,color:"var(--text3)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>&#128205; {r.route}</div>}
                        </div>
                      </div>
                    </div>
                  );
                })}
                <div style={{height:1,background:"var(--border)",marginBottom:10}}/>
              </div>
            )}

            {filtered.length===0&&unassigned.length===0&&(
              <div style={{textAlign:"center",padding:"44px 0",color:"var(--text3)",fontSize:13}}>
                {tab==="action"?"All caught up!":"No records here."}
              </div>
            )}
            {filtered.length===0&&unassigned.length>0&&tab!=="closed"&&currentRep!=="all"&&(
              <div style={{textAlign:"center",padding:"20px 0",color:"var(--text3)",fontSize:13}}>No records in your queue.</div>
            )}
            {filtered.map(r=>{
              const cc=CAT[r.category]||CAT.quote;
              const st=STATUS[r.status]||STATUS.new;
              const isSel=selected===r.id;
              const days=daysUntil(r.date);
              const urgent=days!=null&&days>=0&&days<=3;
              return(
                <div key={r.id} onClick={()=>setSelected(isSel?null:r.id)}
                  style={{display:"flex",background:isSel?"var(--surface2)":"var(--surface)",border:"1px solid "+(isSel?"var(--border)":"var(--border2)"),borderRadius:9,marginBottom:5,cursor:"pointer",overflow:"hidden",transition:"all 0.1s",boxShadow:isSel?"none":"var(--shadow)"}}>
                  <div style={{width:3,background:cc.stripe,flexShrink:0}}/>
                  <div style={{flex:1,padding:"11px 12px",minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.customer}</div>
                        <div style={{fontSize:11,color:"var(--text3)",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.school||r.contact}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{r.received}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:10,fontWeight:600,color:st.color,background:st.bg,borderRadius:4,padding:"2px 6px"}}>{st.label}</span>
                      <span style={{fontSize:10,color:cc.color,background:cc.bg,borderRadius:4,padding:"2px 6px",fontWeight:500}}>{cc.label}</span>
                      {(()=>{const rp=getRep(r.assignee);return r.assignee&&r.assignee!=="all"?<span style={{fontSize:10,fontWeight:700,color:rp.color,background:rp.color+"28",borderRadius:4,padding:"2px 6px"}}>{"● "+rp.name}</span>:<span style={{fontSize:10,color:"var(--text3)",background:"var(--surface2)",borderRadius:4,padding:"2px 6px",border:"1px solid var(--border)"}}>Unassigned</span>;})()}
                      {r.flags&&r.flags.length>0&&<span style={{fontSize:10,color:"var(--amber)",fontWeight:700}}>&#9888; {r.flags.length}</span>}
                      {r.ada&&<span style={{fontSize:10,color:"var(--red)",fontWeight:700}}>ADA</span>}
                      {r.attachments&&r.attachments.length>0&&<span style={{fontSize:10,color:"var(--blue)",fontWeight:500}}>&#128206; {r.attachments.length}</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginTop:5,flexWrap:"wrap"}}>
                      {r.date&&<div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                        <span style={{fontSize:11,fontWeight:700,color:urgent?"var(--red)":"var(--text2)"}}>&#128197; {fmtTravelDate(r.date)}</span>
                        {days!=null&&days>=0&&days<=7&&<span style={{fontSize:10,color:urgent?"var(--red)":"var(--amber)",fontWeight:700}}>{days===0?"· Today":days===1?"· Tomorrow":"· "+days+" days"}</span>}

                    </div>
                  </div>

                </div>
              );
            })}
          </div>
        </div>

        {/* Detail panel */}
        {selected&&selRec?(()=>{
          const cc=CAT[selRec.category]||CAT.quote;
          const st=STATUS[selRec.status]||STATUS.new;
          const repD=getRep(selRec.assignee);
          const days=daysUntil(selRec.date);
          const urgent=days!=null&&days>=0&&days<=3;
          return(
            <div className="slide-in" style={{flex:1,display:"flex",flexDirection:"column",background:"var(--surface)",overflow:"hidden"}}>
              <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>

                      <option value="forwarded">Forwarded ✓</option>
                      <option value="unqualified">Not Qualified ✓</option>

                  </select>
                  <span style={{fontSize:11,background:repD.color+"18",color:repD.color,borderRadius:5,padding:"3px 9px",fontWeight:600}}>{repD.name}</span>
                  {selRec.tripType==="complex"&&<span style={{fontSize:11,background:"var(--purple-bg)",color:"var(--purple)",borderRadius:5,padding:"3px 9px"}}>Multi-day</span>}
                  {selRec.ada&&<span style={{fontSize:11,background:"var(--red-bg)",color:"var(--red)",borderRadius:5,padding:"3px 9px",fontWeight:600}}>ADA</span>}
                  {!CLOSED.includes(selRec.status)&&<button onClick={()=>{setFwdNote("");setShowFwd(true);}} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"5px 10px",fontSize:11,color:"var(--text2)",cursor:"pointer",marginLeft:"auto"}}>Forward</button>}
                </div>
              </div>

              <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>

                {urgent&&(
                  <div style={{background:"var(--red-bg)",border:"1px solid var(--red-border)",borderRadius:8,padding:"10px 13px",marginBottom:12,display:"flex",gap:9,alignItems:"center"}}>
                    <span style={{fontSize:16}}>&#9889;</span>
                    <div><div style={{fontSize:13,fontWeight:600,color:"var(--red)"}}>Urgent — trip is {days===0?"today":days===1?"tomorrow":"in "+days+" days"}</div><div style={{fontSize:11,color:"var(--red)",opacity:0.75,marginTop:1}}>Quote immediately.</div></div>
                  </div>
                )}

                {selRec.flags&&selRec.flags.length>0&&(
                  <div style={{background:"var(--amber-bg)",border:"1px solid var(--amber-border)",borderRadius:8,marginBottom:12,overflow:"hidden"}}>
                    <div style={{padding:"7px 13px",borderBottom:"1px solid var(--amber-border)",fontSize:11,color:"var(--amber)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>Flagged Issues</div>
                    {selRec.flags.map((f,i)=>(
                      <div key={i} style={{padding:"7px 13px",fontSize:12,color:"#7c5000",borderBottom:i<selRec.flags.length-1?"1px solid var(--amber-bg)":"none"}}>{f}</div>
                    ))}
                  </div>
                )}

                {selRec.attachments&&selRec.attachments.length>0&&(
                  <div style={{border:"1px solid var(--blue-border)",background:"var(--blue-bg)",borderRadius:8,marginBottom:12,overflow:"hidden"}}>
                    <div style={{padding:"7px 13px",borderBottom:"1px solid var(--blue-border)",fontSize:11,color:"var(--blue)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>Attachments ({selRec.attachments.length})</div>
                    <div style={{padding:"10px 13px",display:"flex",flexWrap:"wrap",gap:7}}>
                      {selRec.attachments.map((att,i)=>{
                        const isImg=att.type&&att.type.startsWith("image/");
                        return(
                          <a key={i} href={att.url} target="_blank" rel="noreferrer"
                            style={{display:"flex",alignItems:"center",gap:6,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:6,padding:"6px 10px",textDecoration:"none",color:"var(--text)"}}>
                            <span style={{fontSize:14}}>{isImg?"&#128444;":"&#128196;"}</span>
                            <div>
                              <div style={{fontSize:11,fontWeight:500,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{att.filename||"Attachment "+(i+1)}</div>
                              <div style={{fontSize:10,color:"var(--text3)"}}>{att.type||"file"}</div>
                            </div>
                          </a>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Trip Details */}
                <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                  <div style={{padding:"9px 15px",borderBottom:"1px solid var(--border)",fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.06em",background:"var(--surface)"}}>Trip Details</div>
                  {[["Travel Date",fmtTravelDate(selRec.date)],["Pickup Time",selRec.pickupTime],["Return Time",selRec.returnTime],["No. of Buses",selRec.numBuses],["Passengers",selRec.passengers],["Vehicle",selRec.vehicle],["Event",selRec.eventType]].filter(([,v])=>v&&v.length>0).map(([l,v],i,arr)=>(
                    <div key={l} style={{display:"flex",alignItems:"baseline",padding:"9px 15px",borderBottom:i<arr.length-1?"1px solid var(--border2)":"none",gap:12}}>
                      <div style={{fontSize:12,color:"var(--text3)",fontWeight:500,width:110,flexShrink:0}}>{l}</div>
                      <div style={{fontSize:14,color:"var(--text)",fontWeight:600}}>{v}</div>
                    </div>
                  ))}
                  {selRec.pickupLocation&&(
                    <div style={{borderTop:"1px solid var(--border)",padding:"9px 15px"}}>
                      <div style={{fontSize:12,color:"var(--text3)",fontWeight:500,marginBottom:6}}>Route</div>
                      <div style={{fontSize:13,color:"var(--text)",fontWeight:600,marginBottom:4}}>{selRec.pickupLocation}</div>
                      {selRec.dropoffLocation&&<div style={{fontSize:13,color:"var(--text2)",paddingLeft:14,borderLeft:"3px solid var(--border)"}}>{selRec.dropoffLocation}</div>}
                    </div>
                  )}
                </div>

                {/* Contact */}
                <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                  <div style={{padding:"9px 15px",borderBottom:"1px solid var(--border)",fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.06em",background:"var(--surface)"}}>Contact</div>
                  {[["Name",selRec.customer],["Organization",selRec.school],["Email",selRec.contact],["Phone",selRec.phone]].filter(([,v])=>v&&v.length>0).map(([l,v],i,arr)=>(
                    <div key={l} style={{display:"flex",alignItems:"baseline",padding:"9px 15px",borderBottom:i<arr.length-1?"1px solid var(--border2)":"none",gap:12}}>
                      <div style={{fontSize:12,color:"var(--text3)",fontWeight:500,width:110,flexShrink:0}}>{l}</div>
                      <div style={{fontSize:14,color:"var(--text)",fontWeight:500,wordBreak:"break-all"}}>{v}</div>
                    </div>
                  ))}
                </div>

                {selRec.draftReply&&(
                  <div style={{border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                    <div style={{padding:"9px 13px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--surface2)"}}>
                      <span style={{fontSize:10,color:"var(--text2)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>AI Draft Reply</span>
                      <button onClick={()=>{navigator.clipboard.writeText(selRec.draftReply);setCopied(true);setTimeout(()=>setCopied(false),2000);}}
                        style={{background:copied?"var(--green-bg)":"var(--surface)",border:"1px solid "+(copied?"var(--green-border)":"var(--border)"),borderRadius:5,padding:"3px 10px",color:copied?"var(--green)":"var(--text2)",fontSize:11,cursor:"pointer"}}>
                        {copied?"Copied":"Copy"}
                      </button>
                    </div>
                    <div style={{padding:"14px 15px",fontSize:13,color:"var(--text2)",lineHeight:1.85,whiteSpace:"pre-wrap"}}>{selRec.draftReply}</div>
                    {!approved.includes(selRec.id)?(
                      <div style={{padding:"9px 13px",borderTop:"1px solid var(--border)",display:"flex",gap:7,background:"var(--surface2)"}}>
                        <button onClick={()=>setApproved(p=>[...p,selRec.id])} style={{flex:1,background:"var(--green)",border:"none",borderRadius:7,padding:"8px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>Approve and Send</button>
                        <button style={{flex:1,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:7,padding:"8px",color:"var(--text2)",fontSize:12,cursor:"pointer"}}>Edit First</button>
                      </div>
                    ):(
                      <div style={{padding:"9px 13px",borderTop:"1px solid var(--green-border)",background:"var(--green-bg)",fontSize:12,color:"var(--green)",fontWeight:600}}>Sent to {selRec.contact}</div>
                    )}
                  </div>
                )}

                {selRec.note&&(
                  <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,padding:"12px 14px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600,marginBottom:5}}>Notes</div>
                    <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65}}>{selRec.note}</div>
                  </div>
                )}

                {selRec.conversationLog&&(
                  <div style={{border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                    <div style={{padding:"9px 13px",borderBottom:"1px solid var(--border)",background:"var(--surface2)",fontSize:10,color:"var(--text2)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Conversation History</div>
                    <div style={{padding:"14px 15px",fontSize:13,color:"var(--text2)",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{selRec.conversationLog}</div>
                  </div>
                )}

                <div style={{border:"1px solid var(--border)",borderRadius:9,overflow:"hidden"}}>
                  <div style={{padding:"9px 13px",borderBottom:"1px solid var(--border)",background:"var(--surface2)",fontSize:10,color:"var(--text2)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Original Email</div>
                  <div style={{padding:"14px 15px",fontSize:13,color:"var(--text2)",lineHeight:1.85,whiteSpace:"pre-wrap",fontFamily:"Georgia,serif"}}>{selRec.fullEmail||"No email body recorded."}</div>
                </div>
              </div>
            </div>
          );
        })():(
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,color:"var(--text3)",background:"var(--surface)"}}>
            <div style={{fontSize:28,opacity:0.25}}>&#128393;</div>
            <div style={{fontSize:13}}>Select a record to view details</div>
          </div>
        )}
      </div>

      {showFwd&&selRec&&(
        <div style={{position:"fixed",inset:0,background:"rgba(28,25,23,0.45)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowFwd(false)}>
          <div className="fade-in" style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:13,padding:26,width:480,maxHeight:"80vh",overflowY:"auto",boxShadow:"var(--shadow-lg)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>Forward to Manager</div>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:18}}>{selRec.customer} — {selRec.school}</div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,fontWeight:500}}>To</div>
              <input value={fwdTo} onChange={e=>setFwdTo(e.target.value)} style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"7px 10px",fontSize:12,color:"var(--text)",outline:"none"}}/>
            </div>
            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,fontWeight:500}}>Note</div>
              <textarea value={fwdNote} onChange={e=>setFwdNote(e.target.value)} rows={3} style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"7px 10px",fontSize:12,color:"var(--text)",outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
            </div>
            <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:"9px 11px",marginBottom:14,fontSize:11,color:"var(--text3)",lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:110,overflowY:"auto"}}>{selRec.fullEmail}</div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>{updateStatus(selRec.id,"forwarded");setShowFwd(false);}} style={{flex:1,background:"var(--blue)",border:"none",borderRadius:7,padding:9,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>Send Forward</button>
              <button onClick={()=>setShowFwd(false)} style={{flex:1,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:9,color:"var(--text2)",fontSize:12,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [hasToken,setHasToken]=useState(()=>!!getToken());
  const [unlocked,setUnlocked]=useState(()=>sessionStorage.getItem("ecl_auth")==="1");
  if(!hasToken)return <TokenSetup onSave={()=>setHasToken(true)}/>;
  if(!unlocked)return <PinScreen onUnlock={()=>setUnlocked(true)}/>;
  return <Dashboard/>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
