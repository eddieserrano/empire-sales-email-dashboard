let _audioCtx=null;
const getAudioCtx=()=>{const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;if(!_audioCtx)_audioCtx=new AC();if(_audioCtx.state==="suspended")_audioCtx.resume();return _audioCtx;};
const beep=type=>{try{const ctx=getAudioCtx();if(!ctx)return;const notes=type==="ready"?[[523,0,0.3],[659,0.13,0.3],[784,0.26,0.4]]:[[440,0,0.25],[440,0.15,0.2]];notes.forEach(([f,d,vol])=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type==="ready"?"sine":"triangle";o.frequency.setValueAtTime(f,ctx.currentTime+d);g.gain.setValueAtTime(vol,ctx.currentTime+d);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.4);o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.45);});}catch(e){}};

const fmtDate=s=>{if(!s)return"";const d=new Date(s);if(isNaN(d))return s;const now=new Date();const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());const yest=new Date(+today-86400000);const dd=new Date(d.getFullYear(),d.getMonth(),d.getDate());const t=d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).toLowerCase();if(+dd===+today)return"Today "+t;if(+dd===+yest)return"Yesterday "+t;return d.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+t;};
const fmtTravelDate=s=>{if(!s)return"";const iso=s.match(/^(\d{4})-(\d{2})-(\d{2})/);if(iso)return iso[2]+"/"+iso[3]+"/"+iso[1].slice(2);return s;};
const daysUntil=s=>{if(!s)return null;try{const d=new Date(s);if(isNaN(d))return null;return Math.ceil((d-Date.now())/86400000);}catch(e){return null;}};

const mapRec=rec=>{
  const f=rec.fields;
  const ar=(typeof f["Assignee"]==="object"?f["Assignee"]&&f["Assignee"].name:f["Assignee"])||"";
  const assignee=ar.toLowerCase().includes("newanda")?"newanda":ar.toLowerCase().includes("victor")?"victor":"";
  const rawStatus=(f["Status"]||"new").toLowerCase();
  const status=SMAP[rawStatus]||"new";
  const catRaw=(f["Category"]||"").toLowerCase().trim();
  const category=catRaw.includes("quote")||catRaw.includes("school")||catRaw.includes("charter")||catRaw.includes("trip")||catRaw.includes("field")?"quote":catRaw.includes("inquiry")?"inquiry":catRaw.includes("priority")||catRaw.includes("urgent")?"priority":catRaw.includes("spam")||catRaw.includes("operations")||catRaw.includes("complaint")||catRaw.includes("vendor")||catRaw.includes("solicita")||catRaw.includes("marketing")||catRaw.includes("unclassified")||catRaw.includes("other")||catRaw.includes("unknown")?"operations":catRaw.length>0?"quote":"operations";
  const tt=(f["Trip Type"]||"standard").toLowerCase();
  const tripType=tt.includes("complex")||tt.includes("multi")?"complex":"standard";
  const flagsRaw=f["Flags"]||"";
  const flags=flagsRaw?flagsRaw.split(/[,\n]/).map(s=>s.trim()).filter(Boolean):[];
  const pickup=f["Pickup Location"]||"",dropoff=f["Dropoff Location"]||"";
  const route=pickup&&dropoff?pickup+" → "+dropoff:pickup||dropoff||"";
  return{
    id:rec.id,customer:f["Customer Name"]||"Unknown",contact:f["Email"]||"",
    phone:f["Phone"]||"",school:f["School / Org"]||"",category,status,assignee,
    tripType,flags,route,numBuses:f["Num Buses"]!=null?String(f["Num Buses"]):"",
    date:f["Travel Date"]||"",pickupLocation:pickup,dropoffLocation:dropoff,

    gmailLinks:f["Gmail Link"]?f["Gmail Link"].split(",").map(s=>s.trim()).filter(Boolean):[]
  };
};

const fetchAll=async()=>{
  let records=[],offset=null;
  do{
    const url=new URL("https://api.airtable.com/v0/"+AIRTABLE_BASE_ID+"/"+encodeURIComponent(AIRTABLE_TABLE));
    url.searchParams.set("pageSize","100");url.searchParams.set("sort[0][field]","Received At");url.searchParams.set("sort[0][direction]","desc");
    if(offset)url.searchParams.set("offset",offset);
    const res=await fetch(url.toString(),{headers:{Authorization:"Bearer "+getToken()}});
    if(!res.ok){const e=await res.json();throw new Error(e&&e.error&&e.error.message||"Error "+res.status);}
    const json=await res.json();records=[...records,...(json.records||[])];offset=json.offset||null;
  }while(offset);
  return records.map(mapRec);
};

const patchStatus=async(recId,statusKey)=>{
  const val=STATUS_TO_AIRTABLE[statusKey];if(!val)return;
  await fetch("https://api.airtable.com/v0/"+AIRTABLE_BASE_ID+"/"+encodeURIComponent(AIRTABLE_TABLE)+"/"+recId,{
    method:"PATCH",headers:{"Authorization":"Bearer "+getToken(),"Content-Type":"application/json"},
    body:JSON.stringify({fields:{"Status":val}})
  });
};

// Token Setup Screen
function TokenSetup({onSave}){
  const [t,setT]=useState("");const [err,setErr]=useState("");
  const go=()=>{const v=t.trim();if(!v.startsWith("pat")||v.length<30){setErr("Should start with 'pat' and be much longer.");return;}saveToken(v);onSave();};
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div className="fade-in" style={{background:"var(--surface)",borderRadius:16,padding:40,width:440,boxShadow:"var(--shadow-lg)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
          <div style={{width:42,height:42,borderRadius:10,background:"var(--ecl)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:16}}>EC</div>
          <div><div style={{fontSize:16,fontWeight:700}}>First-Time Setup</div><div style={{fontSize:12,color:"var(--text3)",marginTop:1}}>Enter your Airtable token to connect</div></div>
        </div>
        <div style={{fontSize:11,color:"var(--text3)",marginBottom:6,letterSpacing:"0.06em",textTransform:"uppercase",fontWeight:500}}>Airtable Token</div>
        <input type="password" value={t} onChange={e=>{setT(e.target.value);setErr("");}} placeholder="patXXXXXXXXXX..."
          style={{width:"100%",background:"var(--surface2)",border:"1.5px solid "+(err?"var(--red-border)":"var(--border)"),borderRadius:8,padding:"10px 13px",fontSize:13,color:"var(--text)",outline:"none",marginBottom:6}}/>
        {err&&<div style={{fontSize:12,color:"var(--red)",marginBottom:10}}>{err}</div>}
        <button onClick={go} style={{width:"100%",background:"var(--ecl)",border:"none",borderRadius:8,padding:12,color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",marginTop:6}}>Save and Continue</button>
      </div>
    </div>
  );
}

// PIN Screen
function PinScreen({onUnlock}){
  const [pin,setPin]=useState("");const [shake,setShake]=useState(false);const [err,setErr]=useState(false);
  const tryPin=v=>{if(v===ACCESS_PIN){sessionStorage.setItem("ecl_auth","1");onUnlock();}else if(v.length===ACCESS_PIN.length){setShake(true);setErr(true);setTimeout(()=>{setShake(false);setErr(false);setPin("");},650);}};
  const tap=k=>{if(!k)return;if(k==="DEL"){setPin(p=>p.slice(0,-1));return;}const n=pin+k;setPin(n);tryPin(n);};
  useEffect(()=>{const h=e=>{if(e.key>="0"&&e.key<="9")tap(e.key);else if(e.key==="Backspace")tap("DEL");};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[pin]);
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div className="fade-in" style={{textAlign:"center"}}>
        <div style={{width:52,height:52,borderRadius:13,background:"var(--ecl)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:18,margin:"0 auto 14px",boxShadow:"0 4px 18px rgba(192,66,10,0.3)"}}>EC</div>
        <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Sales Inbox</div>
        <div style={{fontSize:12,color:"var(--text3)",marginBottom:28}}>Empire Coach Line</div>
        <div style={{background:"var(--surface)",borderRadius:16,padding:"24px 32px",boxShadow:"var(--shadow-md)",width:280}}>
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:18}}>Enter your PIN</div>
          <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:22,animation:shake?"shake 0.35s ease":"none"}}>
            {[0,1,2,3].map(i=>(<div key={i} style={{width:11,height:11,borderRadius:"50%",background:i<pin.length?(err?"var(--red)":"var(--ecl)"):"var(--border2)",transition:"all 0.15s"}}/>))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7}}>
            {["1","2","3","4","5","6","7","8","9","","0","DEL"].map((k,i)=>(
              <button key={i} onClick={()=>tap(k)} disabled={!k}
                style={{background:k==="DEL"?"var(--surface2)":k?"var(--surface)":"transparent",border:k?"1px solid var(--border2)":"none",borderRadius:8,padding:"13px 0",color:k==="DEL"?"var(--text2)":"var(--text)",fontSize:k==="DEL"?12:17,fontWeight:600,cursor:k?"pointer":"default"}}>
                {k}
              </button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

    try{
      const recs=useSample?SAMPLE_DATA:await fetchAll();
      if(sound&&prev.current.length){
        recs.forEach(r=>{
          const old=prev.current.find(o=>o.id===r.id);
          if(r.status==="ready"&&(!old||old.status!=="ready"))beep("ready");
          else if(r.status==="new"&&!old)beep("new");
        });
      }
      const merged=recs.map(r=>{const p=pendingUpdates.current[r.id];return p?{...r,status:p}:r;});
      prev.current=merged;setData(merged);setLastFetched(new Date());
    }catch(e){setError(e.message);}
    finally{setLoading(false);}
  },[sound]);

  useEffect(()=>{load();},[]);
  useEffect(()=>{const i=setInterval(load,60000);return()=>clearInterval(i);},[load]);

  const pickRep=id=>{saveRepS(id);setCurrentRep(id);setShowRepMenu(false);};

  const updateStatus=(id,val)=>{
    setData(p=>p.map(r=>r.id===id?{...r,status:val}:r));
    if(val==="closed"||val==="forwarded")setSelected(null);
    pendingUpdates.current[id]=val;
    patchStatus(id,val).catch(e=>console.error("Patch failed:",e));
  };

  const updateAssignee=(id,name)=>{
    setData(p=>p.map(r=>r.id===id?{...r,assignee:name.toLowerCase()}:r));
    patchAssignee(id,name).catch(e=>console.error("Assignee patch failed:",e));
  };

  const repObj=getRep(currentRep);
  const byRep=currentRep==="all"?data:data.filter(r=>r.assignee===currentRep||r.assignee==="");

  // Count helpers — 4 tabs matching status exactly
  const newRecs=byRep.filter(r=>r.status==="new");
  const awaitingRecs=byRep.filter(r=>r.status==="awaiting");
  const readyRecs=byRep.filter(r=>r.status==="ready");
  const closedRecs=byRep.filter(r=>r.status==="closed"||r.status==="handled"||r.status==="forwarded");

  const tabRecs=(tab==="new"?newRecs:tab==="awaiting"?awaitingRecs:tab==="ready"?readyRecs:closedRecs)
    .filter(r=>tab!=="closed"||closedFilter==="all"||(closedFilter==="closed"?r.status==="closed":r.status==="handled"||r.status==="forwarded"));

  // Apply category + search filter
  const filtered=tabRecs.filter(r=>{
    if(catFilter&&r.category!==catFilter)return false;
    if(search){const q=search.toLowerCase();if(!(r.customer||"").toLowerCase().includes(q)&&!(r.school||"").toLowerCase().includes(q)&&!(r.route||"").toLowerCase().includes(q)&&!(r.contact||"").toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>{
    if(tab==="new"||tab==="ready"){
      if(a.category==="priority"&&b.category!=="priority")return -1;
      if(b.category==="priority"&&a.category!=="priority")return 1;
      if(a.date&&b.date)return a.date.localeCompare(b.date);
      if(a.date)return -1;if(b.date)return 1;
      return(a.receivedRaw||"").localeCompare(b.receivedRaw||"");
    }
    return(b.receivedRaw||"").localeCompare(a.receivedRaw||"");
  });

  const sendForward=async()=>{
    if(!selRec||!fwdTo)return;
    setFwdSending(true);
    try{
      await fetch(WEBHOOK,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          to:fwdTo,
          subject:"Fwd: "+(selRec.school||selRec.customer)+" — Charter Inquiry",
          body:(fwdNote?fwdNote+"\n\n--- Original Message ---\n\n":"")+selRec.fullEmail+(selRec.gmailLinks&&selRec.gmailLinks.length?"\n\n--- Attachments ---\n"+selRec.gmailLinks.join("\n"):""),
          customerName:selRec.customer,
          recordId:selRec.id,
          type:"forward"
        })
      });
      setFwdSent(true);
      setFwdedTo(p=>({...p,[selRec.id]:fwdTo}));
      updateStatus(selRec.id,"closed");
      setTimeout(()=>{setShowFwd(false);setFwdSent(false);setFwdNote("");},1500);
    }catch(e){alert("Failed to send. Please try again.");}
    finally{setFwdSending(false);}
  };

  const isSalesEmail=r=>r.category==="quote"||r.category==="inquiry";
  const isOpsEmail=r=>r.category==="operations"||r.category==="priority";

  return(
    <div style={{height:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* Error bar */}
      {error&&!loading&&(
        <div style={{background:"var(--red-bg)",borderBottom:"1px solid var(--red-border)",padding:"7px 18px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:12,color:"var(--red)",fontWeight:600}}>Could not load data: {error}</span>
          <button onClick={load} style={{background:"var(--surface)",border:"1px solid var(--red-border)",borderRadius:5,padding:"3px 10px",color:"var(--red)",fontSize:11,cursor:"pointer",marginLeft:"auto"}}>Retry</button>
          <button onClick={()=>{localStorage.removeItem("ecl_at_token");sessionStorage.removeItem("ecl_auth");window.location.reload();}} style={{background:"var(--red)",border:"none",borderRadius:5,padding:"3px 10px",color:"#fff",fontSize:11,cursor:"pointer",fontWeight:600}}>Re-enter Token</button>
        </div>
      )}

      {/* Rep picker modal */}
      {showRepMenu&&(
        <div style={{position:"fixed",inset:0,background:"rgba(28,25,23,0.5)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div className="fade-in" style={{background:"var(--surface)",borderRadius:16,padding:36,width:320,boxShadow:"var(--shadow-lg)",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:700,marginBottom:4}}>Who are you?</div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:22}}>We'll filter your queue automatically.</div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              {REPS.filter(r=>r.id!=="all").map(r=>(
                <button key={r.id} onClick={()=>pickRep(r.id)}
                  style={{background:r.color,border:"none",borderRadius:10,padding:"13px 20px",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  <span>{r.name}</span>
                  <span style={{background:"rgba(255,255,255,0.2)",borderRadius:7,padding:"2px 9px",fontSize:11}}>
                    {data.filter(x=>x.assignee===r.id&&TODO_STATUSES.includes(x.status)).length} to do
                  </span>
                </button>
              ))}
              <button onClick={()=>pickRep("all")} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:10,padding:"12px 20px",color:"var(--text2)",fontSize:13,cursor:"pointer"}}>View All</button>
            </div>
          </div>
        </div>
      )}

      {/* Top bar */}
      <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",padding:"0 16px",height:50,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{width:28,height:28,borderRadius:7,background:"var(--ecl)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:11,flexShrink:0}}>EC</div>
        <span style={{fontSize:14,fontWeight:700,letterSpacing:"-0.01em"}}>Sales Inbox</span>
        <div style={{height:16,width:1,background:"var(--border)"}}/>
        <div style={{display:"flex",alignItems:"center",gap:6,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:"3px 4px 3px 9px"}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:repObj.color,flexShrink:0}}/>
          <span style={{fontSize:12,fontWeight:600,color:repObj.color}}>{repObj.name}</span>
          <button onClick={()=>setShowRepMenu(true)} style={{background:"var(--border2)",border:"none",borderRadius:4,padding:"2px 7px",fontSize:10,color:"var(--text2)",cursor:"pointer",marginLeft:2}}>switch</button>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:error?"var(--red)":"var(--green)",animation:loading?"pulse 1s ease infinite":"none"}}/>
          <span style={{fontSize:11,color:"var(--text3)"}}>{loading?"syncing...":error?"error":lastFetched?"updated "+lastFetched.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).toLowerCase():""}</span>
        </div>
        <div style={{flex:1}}/>
        <button onClick={load} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px",fontSize:11,color:"var(--text2)",cursor:"pointer"}}>Refresh</button>
        <button onClick={()=>setSound(s=>!s)} style={{background:sound?"var(--green-bg)":"var(--surface2)",border:"1px solid "+(sound?"var(--green-border)":"var(--border)"),borderRadius:6,padding:"4px 10px",fontSize:11,color:sound?"var(--green)":"var(--text2)",cursor:"pointer"}}>{sound?"🔔":"🔕"}</button>
        <button onClick={()=>{sessionStorage.removeItem("ecl_auth");window.location.reload();}} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px",fontSize:11,color:"var(--text2)",cursor:"pointer"}}>Lock</button>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

        {/* Left panel — hidden on mobile when record selected */}
        <div className={selected?"left-panel":"left-panel-visible"} style={{width:selected?360:460,flexShrink:0,display:"flex",flexDirection:"column",borderRight:"1px solid var(--border)",overflow:"hidden",background:"var(--bg)"}}>

          {/* Main tabs — one per status */}
          <div style={{padding:"12px 14px 0",display:"flex",gap:2,borderBottom:"1px solid var(--border2)",background:"var(--surface)"}}>
            {[
              {k:"new",label:"New",count:newRecs.length,color:"var(--blue)"},
              {k:"awaiting",label:"Awaiting Info",count:awaitingRecs.length,color:"var(--amber)"},
              {k:"ready",label:"Ready to Quote",count:readyRecs.length,color:"var(--green)"},
              {k:"closed",label:"Closed",count:closedRecs.length,color:"var(--text3)"},
            ].map(t=>{
              const isOn=tab===t.k;
              return(
                <button key={t.k} onClick={()=>{setTab(t.k);setSelected(null);setCatFilter(null);}}
                  style={{background:"none",border:"none",borderBottom:isOn?"2px solid "+t.color:"2px solid transparent",padding:"8px 12px 10px",fontSize:12,fontWeight:isOn?700:400,color:isOn?t.color:"var(--text3)",cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all 0.1s",whiteSpace:"nowrap"}}>
                  {t.label}
                  {t.count>0&&<span style={{fontSize:11,fontWeight:700,color:isOn?"#fff":"var(--text3)",background:isOn?t.color:"var(--border2)",borderRadius:10,padding:"1px 6px",minWidth:18,textAlign:"center"}}>{t.count}</span>}
                </button>
              );
            })}
          </div>

          {/* Category filter strip */}
          <div style={{padding:"10px 14px 8px",display:"flex",gap:6,flexWrap:"wrap",borderBottom:"1px solid var(--border2)",background:"var(--surface)"}}>
            <button onClick={()=>setCatFilter(null)}
              style={{fontSize:11,fontWeight:catFilter===null?700:400,color:catFilter===null?"var(--text)":"var(--text3)",background:catFilter===null?"var(--surface2)":"none",border:catFilter===null?"1px solid var(--border)":"1px solid transparent",borderRadius:6,padding:"4px 10px",cursor:"pointer"}}>
              All
            </button>
            {Object.entries(CAT).map(([k,v])=>{
              const isOn=catFilter===k;
              const cnt=(tab==="new"?newRecs:tab==="awaiting"?awaitingRecs:tab==="ready"?readyRecs:closedRecs).filter(r=>r.category===k).length;
              if(cnt===0)return null;
              return(
                <button key={k} onClick={()=>setCatFilter(isOn?null:k)}
                  style={{fontSize:11,fontWeight:isOn?700:400,color:isOn?v.color:"var(--text3)",background:isOn?v.bg:"none",border:isOn?"1px solid "+v.border:"1px solid transparent",borderRadius:6,padding:"4px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                  <span style={{width:6,height:6,borderRadius:"50%",background:v.dot,display:"inline-block",flexShrink:0}}/>
                  {v.label} {cnt>0&&<span style={{opacity:0.7}}>{cnt}</span>}
                </button>
              );
            })}
          </div>

          {/* Search */}
          <div style={{padding:"10px 14px 8px",background:"var(--surface)",borderBottom:"1px solid var(--border2)"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name, school, route..."
              style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:"7px 11px",fontSize:12,color:"var(--text)",outline:"none"}}/>
          </div>

          {/* Tab context label */}
          <div style={{padding:"10px 14px 6px",background:"var(--bg)"}}>
            <div style={{fontSize:11,color:"var(--text3)",fontWeight:500}}>
              {tab==="new"&&"Just arrived — review, reply, or assign"}
              {tab==="awaiting"&&"Waiting on customer reply or manager response"}
              {tab==="ready"&&"All info collected — go build the quote in TBN"}
              {tab==="closed"&&(
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span>Filter:</span>
                  {[{k:"all",label:"All"},{k:"closed",label:"Quotes Sent"},{k:"handled",label:"Handled"}].map(f=>(
                    <button key={f.k} onClick={()=>setClosedFilter(f.k)}
                      style={{fontSize:11,fontWeight:closedFilter===f.k?700:400,color:closedFilter===f.k?"var(--text)":"var(--text3)",background:closedFilter===f.k?"var(--surface2)":"none",border:closedFilter===f.k?"1px solid var(--border)":"1px solid transparent",borderRadius:5,padding:"3px 9px",cursor:"pointer"}}>
                      {f.label}
                    </button>
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* Record list */}
          <div style={{flex:1,overflowY:"auto",padding:"0 10px 14px"}}>
            {filtered.length===0&&(
              <div style={{textAlign:"center",padding:"44px 0",color:"var(--text3)",fontSize:13}}>
                {tab==="new"?"No new emails ✓":tab==="ready"?"Nothing ready to quote yet.":"Nothing here."}
              </div>
            )}
            {filtered.map(r=>{
              const cc=CAT[r.category]||CAT.quote;
              const st=STATUS_CFG[r.status]||STATUS_CFG.new;
              const isSel=selected===r.id;
              const days=daysUntil(r.date);
              const urgent=days!=null&&days>=0&&days<=3;
              return(
                <div key={r.id} onClick={()=>setSelected(isSel?null:r.id)}
                  style={{display:"flex",background:isSel?"var(--surface2)":"var(--surface)",border:"1px solid "+(isSel?"var(--border)":"var(--border2)"),borderRadius:9,marginBottom:5,cursor:"pointer",overflow:"hidden",transition:"all 0.1s",boxShadow:isSel?"none":"var(--shadow)"}}>
                  <div style={{width:3,background:cc.dot,flexShrink:0}}/>
                  <div style={{flex:1,padding:"11px 12px",minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
                      <div style={{minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.customer}</div>
                        <div style={{fontSize:11,color:"var(--text3)",marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.school||r.contact}</div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:11,color:"var(--text3)",whiteSpace:"nowrap"}}>{r.received}</div>
                        {urgent&&<div style={{fontSize:10,color:"var(--red)",fontWeight:700,marginTop:2}}>⚡ {days===0?"Today":days===1?"Tomorrow":days+"d"}</div>}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{fontSize:10,fontWeight:600,color:st.color,background:st.bg,borderRadius:4,padding:"2px 7px"}}>{st.label}</span>
                      <span style={{fontSize:10,color:cc.color,background:cc.bg,border:"1px solid "+cc.border,borderRadius:4,padding:"2px 7px",fontWeight:500}}>{cc.label}</span>
                      {r.assignee&&r.assignee!=="all"&&(()=>{const rp=getRep(r.assignee);return<span style={{fontSize:10,fontWeight:600,color:rp.color,background:rp.color+"20",borderRadius:4,padding:"2px 7px"}}>{"● "+rp.name}</span>;})()}
                      {!r.assignee&&<span style={{fontSize:10,color:"var(--red)",background:"var(--red-bg)",border:"1px solid var(--red-border)",borderRadius:4,padding:"2px 7px",fontWeight:600}}>Unassigned</span>}
                      {r.ada&&<span style={{fontSize:10,color:"var(--red)",fontWeight:700}}>ADA</span>}
                      {r.flags&&r.flags.length>0&&<span style={{fontSize:10,color:"var(--amber)",fontWeight:700}}>⚠ {r.flags.length}</span>}
                      {r.gmailLinks&&r.gmailLinks.length>0&&<span style={{fontSize:10,color:"var(--blue)",fontWeight:600,background:"var(--blue-bg)",borderRadius:4,padding:"2px 7px"}}>📎 {r.gmailLinks.length}</span>}
                    </div>
                    {r.route&&<div style={{fontSize:11,color:"var(--text3)",marginTop:5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>📍 {r.route}</div>}
                    {r.date&&<div style={{fontSize:11,fontWeight:600,color:urgent?"var(--red)":"var(--text2)",marginTop:3}}>📅 {fmtTravelDate(r.date)}</div>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Right detail panel */}
        {selRec?(()=>{
          const cc=CAT[selRec.category]||CAT.quote;
          const st=STATUS_CFG[selRec.status]||STATUS_CFG.new;
          const days=daysUntil(selRec.date);
          const urgent=days!=null&&days>=0&&days<=3;
          const isSales=isSalesEmail(selRec);
          return(
            <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",background:"var(--surface)"}}>

              {/* Mobile back button */}
              <div style={{display:"none"}} className="mobile-back">
                <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",borderBottom:"1px solid var(--border2)",color:"var(--ecl)",fontSize:13,fontWeight:600,cursor:"pointer",padding:"12px 16px",width:"100%",textAlign:"left",display:"block"}}>← Back to inbox</button>
              </div>
              <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"flex-start",gap:12,flexShrink:0,background:"var(--surface)"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                    <span style={{fontSize:16,fontWeight:700}}>{selRec.customer}</span>
                    {selRec.ada&&<span style={{fontSize:11,background:"var(--red-bg)",color:"var(--red)",borderRadius:5,padding:"2px 8px",fontWeight:600}}>ADA</span>}
                  </div>
                  <div style={{fontSize:12,color:"var(--text3)"}}>{selRec.school||selRec.contact}</div>
                  <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:11,fontWeight:600,color:st.color,background:st.bg,borderRadius:5,padding:"3px 9px"}}>{st.label}</span>
                    <span style={{fontSize:11,color:cc.color,background:cc.bg,border:"1px solid "+cc.border,borderRadius:5,padding:"3px 9px",fontWeight:500}}>{cc.label}</span>
                    {selRec.assignee&&(()=>{const rp=getRep(selRec.assignee);return<span style={{fontSize:11,fontWeight:600,color:rp.color,background:rp.color+"20",borderRadius:5,padding:"3px 9px"}}>{"● "+rp.name}</span>;})()}
                  </div>
                </div>
              </div>

              <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>

                {/* Action buttons — at top for quick access */}
                {selRec.status!=="closed"&&(
                  <div style={{border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                    <div style={{padding:"9px 13px",borderBottom:"1px solid var(--border)",background:"var(--surface2)",fontSize:10,color:"var(--text2)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Actions</div>
                    <div style={{padding:"10px 13px",display:"flex",flexWrap:"wrap",gap:7}}>
                      {/* Assign */}
                      <div style={{display:"flex",alignItems:"center",gap:6,width:"100%",paddingBottom:8,borderBottom:"1px solid var(--border2)",marginBottom:2}}>
                        <span style={{fontSize:11,color:"var(--text3)",fontWeight:500,flexShrink:0}}>Assign to:</span>
                        {REPS.filter(r=>r.id!=="all").map(r=>{
                          const isAssigned=selRec.assignee===r.id;
                          return(
                            <button key={r.id} onClick={()=>updateAssignee(selRec.id,r.name)}
                              style={{fontSize:11,fontWeight:isAssigned?700:400,color:isAssigned?"#fff":r.color,background:isAssigned?r.color:r.color+"18",border:"1px solid "+r.color+"44",borderRadius:6,padding:"4px 12px",cursor:"pointer"}}>
                              {isAssigned?"● ":""}{r.name}
                            </button>
                          );
                        })}
                      </div>

                      {/* Next-step actions based on current status */}
                      {selRec.status==="new"&&<>
                        <button onClick={()=>updateStatus(selRec.id,"ready")} style={{background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:7,padding:"8px 14px",color:"var(--green)",fontSize:12,fontWeight:600,cursor:"pointer"}}>✓ I Have Everything — Ready to Quote</button>
                        <button onClick={()=>updateStatus(selRec.id,"awaiting")} style={{background:"var(--amber-bg)",border:"1px solid var(--amber-border)",borderRadius:7,padding:"8px 14px",color:"var(--amber)",fontSize:12,fontWeight:600,cursor:"pointer"}}>Sent Reply — Awaiting Info</button>
                      </>}

                      {selRec.status==="awaiting"&&<>
                        <button onClick={()=>updateStatus(selRec.id,"ready")} style={{background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:7,padding:"8px 14px",color:"var(--green)",fontSize:12,fontWeight:600,cursor:"pointer"}}>✓ Got Everything — Ready to Quote</button>
                        <button onClick={()=>updateStatus(selRec.id,"new")} style={{background:"var(--blue-bg)",border:"1px solid var(--blue-border)",borderRadius:7,padding:"8px 14px",color:"var(--blue)",fontSize:12,fontWeight:600,cursor:"pointer"}}>← Move Back to New</button>
                      </>}

                      {selRec.status==="ready"&&<>
                        <button onClick={()=>updateStatus(selRec.id,"awaiting")} style={{background:"var(--amber-bg)",border:"1px solid var(--amber-border)",borderRadius:7,padding:"8px 14px",color:"var(--amber)",fontSize:12,fontWeight:600,cursor:"pointer"}}>← Still Need Info</button>
                      </>}

                      {selRec.status==="forwarded"&&<>
                        <button onClick={()=>updateStatus(selRec.id,"new")} style={{background:"var(--blue-bg)",border:"1px solid var(--blue-border)",borderRadius:7,padding:"8px 14px",color:"var(--blue)",fontSize:12,fontWeight:600,cursor:"pointer"}}>← Move Back to New</button>
                      </>}

                      {/* Forward — always available */}
                      <button onClick={()=>{setFwdNote("");setFwdSent(false);setShowFwd(true);}} style={{background:"var(--purple-bg)",border:"1px solid var(--purple-border)",borderRadius:7,padding:"8px 14px",color:"var(--purple)",fontSize:12,fontWeight:600,cursor:"pointer"}}>↪ Forward</button>

                      {/* Close */}
                      <button onClick={()=>updateStatus(selRec.id, selRec.status==="ready"?"closed":"handled")}
                        style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:"8px 14px",color:"var(--text2)",fontSize:12,fontWeight:600,cursor:"pointer",marginLeft:"auto"}}>
                        {selRec.status==="ready"?"✓ Quote Sent in TBN — Close":"✓ Handled — Close"}
                      </button>
                    </div>
                  </div>
                )}

                {/* Closed state */}
                {selRec.status==="closed"&&(
                  <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,padding:"12px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{fontSize:13,color:"var(--text3)",fontWeight:500}}>✓ This record is closed</div>
                    <button onClick={()=>updateStatus(selRec.id,"new")} style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"5px 12px",fontSize:11,color:"var(--text3)",cursor:"pointer"}}>Reopen</button>
                  </div>
                )}

                {fwdedTo[selRec.id]&&(
                  <div style={{background:"var(--purple-bg)",border:"1px solid var(--purple-border)",borderRadius:9,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:13}}>↪</span>
                    <div>
                      <div style={{fontSize:11,color:"var(--purple)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>Forwarded This Session</div>
                      <div style={{fontSize:12,color:"var(--purple)"}}>{fwdedTo[selRec.id]}</div>
                    </div>
                  </div>
                )}

                {/* Urgent banner */}
                {urgent&&(
                  <div style={{background:"var(--red-bg)",border:"1px solid var(--red-border)",borderRadius:8,padding:"10px 13px",marginBottom:12,display:"flex",gap:9,alignItems:"center"}}>
                    <span style={{fontSize:16}}>⚡</span>
                    <div><div style={{fontSize:13,fontWeight:600,color:"var(--red)"}}>Urgent — trip is {days===0?"today":days===1?"tomorrow":"in "+days+" days"}</div><div style={{fontSize:11,color:"var(--red)",opacity:0.75,marginTop:1}}>Quote immediately.</div></div>
                  </div>
                )}

                {/* Flags */}
                {selRec.flags&&selRec.flags.length>0&&(
                  <div style={{background:"var(--amber-bg)",border:"1px solid var(--amber-border)",borderRadius:8,marginBottom:12,overflow:"hidden"}}>
                    <div style={{padding:"7px 13px",borderBottom:"1px solid var(--amber-border)",fontSize:11,color:"var(--amber)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>⚠ Flagged Issues</div>
                    {selRec.flags.map((f,i)=>(<div key={i} style={{padding:"7px 13px",fontSize:12,color:"#7c5000",borderBottom:i<selRec.flags.length-1?"1px solid var(--amber-bg)":"none"}}>{f}</div>))}
                  </div>
                )}

                {/* Attachments */}
                {selRec.gmailLinks&&selRec.gmailLinks.length>0&&(
                  <div style={{border:"1px solid var(--blue-border)",background:"var(--blue-bg)",borderRadius:9,marginBottom:12,overflow:"hidden"}}>
                    <div style={{padding:"7px 13px",borderBottom:"1px solid var(--blue-border)",fontSize:11,color:"var(--blue)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.05em"}}>📎 Attachments ({selRec.gmailLinks.length})</div>
                    <div style={{padding:"10px 13px",display:"flex",flexDirection:"column",gap:7}}>
                      {selRec.gmailLinks.map((link,i)=>(
                        <a key={i} href={link} target="_blank" rel="noreferrer"
                          style={{display:"flex",alignItems:"center",gap:10,background:"var(--surface)",border:"1px solid var(--blue-border)",borderRadius:7,padding:"10px 14px",textDecoration:"none"}}>
                          <span style={{fontSize:18}}>📄</span>
                          <div style={{flex:1}}>
                            <div style={{fontSize:13,fontWeight:600,color:"var(--blue)"}}>Attachment {selRec.gmailLinks.length>1?i+1:""}</div>
                            <div style={{fontSize:11,color:"var(--blue)",opacity:0.75}}>Opens in Google Drive</div>
                          </div>
                          <span style={{fontSize:12,color:"var(--blue)",fontWeight:600}}>Open →</span>
                        </a>
                      ))}
                    </div>
                  </div>
                )}

                {/* Trip Details — only show for sales emails */}
                {isSales&&(selRec.date||selRec.pickupLocation||selRec.numBuses)&&(
                  <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                    <div style={{padding:"9px 15px",borderBottom:"1px solid var(--border)",fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.06em",background:"var(--surface)"}}>Trip Details</div>
                    {[["Travel Date",fmtTravelDate(selRec.date)],["Pickup Time",selRec.pickupTime],["Return Time",selRec.returnTime],["No. of Buses",selRec.numBuses],["Passengers",selRec.passengers],["Vehicle",selRec.vehicle],["Event",selRec.eventType]].filter(([,v])=>v&&v.length>0).map(([l,v],i,arr)=>(
                      <div key={l} style={{display:"flex",alignItems:"baseline",padding:"9px 15px",borderBottom:i<arr.length-1?"1px solid var(--border2)":"none",gap:12}}>
                        <div style={{fontSize:12,color:"var(--text3)",fontWeight:500,width:110,flexShrink:0}}>{l}</div>
                        <div style={{fontSize:14,color:"var(--text)",fontWeight:600}}>{v}</div>
                      </div>
                    ))}
                    {selRec.pickupLocation&&(
                      <div style={{borderTop:"1px solid var(--border)",padding:"9px 15px"}}>
                        <div style={{fontSize:12,color:"var(--text3)",fontWeight:500,marginBottom:6}}>Route</div>
                        <div style={{fontSize:13,color:"var(--text)",fontWeight:600,marginBottom:4}}>{selRec.pickupLocation}</div>
                        {selRec.dropoffLocation&&<div style={{fontSize:13,color:"var(--text2)",paddingLeft:14,borderLeft:"3px solid var(--border)"}}>{selRec.dropoffLocation}</div>}
                      </div>
                    )}
                  </div>
                )}

                {/* Contact */}
                <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                  <div style={{padding:"9px 15px",borderBottom:"1px solid var(--border)",fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:"0.06em",background:"var(--surface)"}}>Contact</div>
                  {[["Name",selRec.customer],["Organization",selRec.school],["Email",selRec.contact],["Phone",selRec.phone]].filter(([,v])=>v&&v.length>0).map(([l,v],i,arr)=>(
                    <div key={l} style={{display:"flex",alignItems:"baseline",padding:"9px 15px",borderBottom:i<arr.length-1?"1px solid var(--border2)":"none",gap:12}}>
                      <div style={{fontSize:12,color:"var(--text3)",fontWeight:500,width:110,flexShrink:0}}>{l}</div>
                      <div style={{fontSize:14,color:"var(--text)",fontWeight:500,wordBreak:"break-all"}}>{v}</div>
                    </div>
                  ))}
                </div>

                {/* AI Draft Reply — only for sales */}
                {isSales&&selRec.draftReply&&(
                  <div style={{border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                    <div style={{padding:"9px 13px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--surface2)"}}>
                      <span style={{fontSize:10,color:"var(--text2)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>AI Draft Reply</span>
                      <button onClick={()=>{navigator.clipboard.writeText(editMode?editedReply:selRec.draftReply);setCopied(true);setTimeout(()=>setCopied(false),2000);}}
                        style={{background:copied?"var(--green-bg)":"var(--surface)",border:"1px solid "+(copied?"var(--green-border)":"var(--border)"),borderRadius:5,padding:"3px 10px",color:copied?"var(--green)":"var(--text2)",fontSize:11,cursor:"pointer"}}>
                        {copied?"Copied":"Copy"}
                      </button>
                    </div>
                    {editMode?(
                      <textarea value={editedReply} onChange={e=>setEditedReply(e.target.value)}
                        style={{width:"100%",minHeight:180,padding:"14px 15px",fontSize:13,color:"var(--text)",lineHeight:1.85,background:"var(--bg)",border:"none",borderBottom:"1px solid var(--border)",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
                    ):(
                      <div style={{padding:"14px 15px",fontSize:13,color:"var(--text2)",lineHeight:1.85,whiteSpace:"pre-wrap"}}>{selRec.draftReply}</div>
                    )}
                    {!approved.includes(selRec.id)?(
                      <div style={{padding:"9px 13px",borderTop:"1px solid var(--border)",display:"flex",gap:7,background:"var(--surface2)"}}>
                        <button onClick={async()=>{
                          const bodyToSend=editMode?editedReply:selRec.draftReply;
                          try{
                            await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({to:selRec.contact,subject:"Re: Your Charter Bus Inquiry — Empire Coach Line",body:bodyToSend,customerName:selRec.customer,recordId:selRec.id,type:"reply"})});
                            setApproved(p=>[...p,selRec.id]);
                            setSentMsg(p=>({...p,[selRec.id]:selRec.contact}));
                            setEditMode(false);
                            updateStatus(selRec.id,"awaiting");
                            setTimeout(()=>setApproved(p=>p.filter(x=>x!==selRec.id)),10000);
                          }catch(e){alert("Failed to send. Please try again.");}
                        }} style={{flex:1,background:"var(--green)",border:"none",borderRadius:7,padding:"8px",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                          {editMode?"Send Edited Reply":"Approve & Send Reply"}
                        </button>
                        <button onClick={()=>{if(!editMode)setEditedReply(selRec.draftReply);setEditMode(e=>!e);}}
                          style={{flex:1,background:editMode?"var(--amber-bg)":"var(--surface)",border:"1px solid "+(editMode?"var(--amber-border)":"var(--border)"),borderRadius:7,padding:"8px",color:editMode?"var(--amber)":"var(--text2)",fontSize:12,cursor:"pointer"}}>
                          {editMode?"Cancel Edit":"Edit First"}
                        </button>
                      </div>
                    ):(
                      <div style={{padding:"9px 13px",borderTop:"1px solid var(--green-border)",background:"var(--green-bg)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <span style={{fontSize:12,color:"var(--green)",fontWeight:600}}>✓ Sent to {sentMsg[selRec.id]}</span>
                        <span style={{fontSize:11,color:"var(--green)",opacity:0.7}}>Button reappears in a moment...</span>
                      </div>
                    )}
                  </div>
                )}

                {/* Notes */}
                {selRec.note&&(
                  <div style={{background:"var(--amber-bg)",border:"1px solid var(--amber-border)",borderRadius:9,padding:"12px 14px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"var(--amber)",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:700,marginBottom:5}}>Notes</div>
                    <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.65}}>{selRec.note}</div>
                  </div>
                )}

                {/* Conversation history */}
                {selRec.conversationLog&&(
                  <div style={{border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                    <div style={{padding:"9px 13px",borderBottom:"1px solid var(--border)",background:"var(--surface2)",fontSize:10,color:"var(--text2)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Conversation History</div>
                    <div style={{padding:"14px 15px",fontSize:13,color:"var(--text2)",lineHeight:1.8,whiteSpace:"pre-wrap"}}>{selRec.conversationLog}</div>
                  </div>
                )}

                {/* Original Email */}
                <div style={{border:"1px solid var(--border)",borderRadius:9,overflow:"hidden",marginBottom:12}}>
                  <div style={{padding:"9px 13px",borderBottom:"1px solid var(--border)",background:"var(--surface2)",fontSize:10,color:"var(--text2)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Original Email</div>
                  <div style={{padding:"14px 15px",fontSize:13,color:"var(--text2)",lineHeight:1.85,whiteSpace:"pre-wrap",fontFamily:"Georgia,serif"}}>{selRec.fullEmail||"No email body recorded."}</div>
                </div>

                {/* Closed state indicator */}
                {selRec.status==="closed"&&(
                  <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:9,padding:"12px 14px",marginBottom:12,textAlign:"center"}}>
                    <div style={{fontSize:13,color:"var(--text3)",fontWeight:500}}>✓ This record is closed</div>
                    <button onClick={()=>updateStatus(selRec.id,"new")} style={{marginTop:8,background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"5px 12px",fontSize:11,color:"var(--text3)",cursor:"pointer"}}>Reopen</button>
                  </div>
                )}

              </div>
            </div>
          );
        })():(
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:8,color:"var(--text3)",background:"var(--surface)"}}>
            <div style={{fontSize:32,opacity:0.2}}>✉</div>
            <div style={{fontSize:13}}>Select a record to view details</div>
          </div>
        )}
      </div>

      {/* Forward modal */}
      {showFwd&&selRec&&(
        <div style={{position:"fixed",inset:0,background:"rgba(28,25,23,0.45)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowFwd(false)}>
          <div className="fade-in" style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:13,padding:26,width:480,maxHeight:"80vh",overflowY:"auto",boxShadow:"var(--shadow-lg)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:2}}>Forward to Manager</div>
            <div style={{fontSize:12,color:"var(--text3)",marginBottom:18}}>{selRec.customer}{selRec.school?" — "+selRec.school:""}</div>

            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,fontWeight:600}}>To <span style={{fontWeight:400,textTransform:"none",fontSize:10,color:"var(--text3)"}}>— separate multiple addresses with a comma</span></div>
              <input value={fwdTo} onChange={e=>setFwdTo(e.target.value)} placeholder="email@example.com (one address only)"
                style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"8px 10px",fontSize:12,color:"var(--text)",outline:"none"}}/>
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4,fontWeight:600}}>Note <span style={{fontWeight:400,textTransform:"none",fontSize:10}}>(optional)</span></div>
              <textarea value={fwdNote} onChange={e=>setFwdNote(e.target.value)} rows={3} placeholder="Add context for the recipient..."
                style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,padding:"7px 10px",fontSize:12,color:"var(--text)",outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
            </div>

            <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:"9px 11px",marginBottom:16,fontSize:11,color:"var(--text3)",lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:100,overflowY:"auto"}}>{selRec.fullEmail}</div>

            <div style={{display:"flex",gap:7}}>
              {fwdSent?(
                <div style={{flex:1,background:"var(--green-bg)",border:"1px solid var(--green-border)",borderRadius:7,padding:10,color:"var(--green)",fontSize:12,fontWeight:600,textAlign:"center"}}>✓ Forwarded successfully</div>
              ):(
                <button onClick={sendForward} disabled={fwdSending||!fwdTo}
                  style={{flex:1,background:fwdSending?"var(--surface2)":"var(--purple)",border:"none",borderRadius:7,padding:10,color:fwdSending?"var(--text3)":"#fff",fontSize:12,fontWeight:600,cursor:fwdSending?"default":"pointer"}}>
                  {fwdSending?"Sending...":"↪ Send Forward"}
                </button>
              )}
              <button onClick={()=>setShowFwd(false)} style={{flex:1,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:7,padding:10,color:"var(--text2)",fontSize:12,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [hasToken,setHasToken]=useState(()=>!!getToken());
  const [unlocked,setUnlocked]=useState(()=>sessionStorage.getItem("ecl_auth")==="1");
  if(!hasToken)return <TokenSetup onSave={()=>setHasToken(true)}/>;
  if(!unlocked)return <PinScreen onUnlock={()=>setUnlocked(true)}/>;
  return <Dashboard/>;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
