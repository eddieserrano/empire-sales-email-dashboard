// ─── Audio ────────────────────────────────────────────────────────
const playSound = (type) => {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    if (type === "ready") {
      [[440,0],[660,0.15],[880,0.3]].forEach(([f,d]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.type="sine";
        o.frequency.setValueAtTime(f,ctx.currentTime+d);
        g.gain.setValueAtTime(0.3,ctx.currentTime+d);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.4);
        o.start(ctx.currentTime+d); o.stop(ctx.currentTime+d+0.4);
      });
    } else {
      [[520,0],[520,0.22]].forEach(([f,d]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination); o.type="triangle";
        o.frequency.setValueAtTime(f,ctx.currentTime+d);
        g.gain.setValueAtTime(0.25,ctx.currentTime+d);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.18);
        o.start(ctx.currentTime+d); o.stop(ctx.currentTime+d+0.2);
      });
    }
  } catch(e) {}
};

// ─── Airtable ─────────────────────────────────────────────────────
const formatReceived = (s) => {
  if (!s) return "—";
  const date = new Date(s); if (isNaN(date)) return s;
  const now = new Date();
  const today = new Date(now.getFullYear(),now.getMonth(),now.getDate());
  const yest  = new Date(today-86400000);
  const d     = new Date(date.getFullYear(),date.getMonth(),date.getDate());
  const t = date.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true}).toLowerCase();
  if (d.getTime()===today.getTime()) return `Today, ${t}`;
  if (d.getTime()===yest.getTime())  return `Yesterday, ${t}`;
  return date.toLocaleDateString("en-US",{month:"short",day:"numeric"})+`, ${t}`;
};
const STATUS_MAP = {"new":"new","awaiting info":"awaiting","reply sent":"replied","ready to quote":"ready","quote sent":"sent","not qualified":"unqualified","spam":"spam","spam / scam":"spam","forwarded":"forwarded"};
const mapRecord = (rec) => {
  const f = rec.fields;
  const ar = (typeof f["Assignee"]==="object"?f["Assignee"]?.name:f["Assignee"])||"";
  const assignee = ar.toLowerCase().includes("newanda")?"newanda":ar.toLowerCase().includes("victor")?"victor":ar.toLowerCase()||"victor";
  const status = STATUS_MAP[(f["Status"]||"new").toLowerCase()]||"new";
  const cat = (f["Category"]||"quote").toLowerCase();
  const category = ["quote","inquiry","operations","priority"].includes(cat)?cat:"quote";
  const tt = (f["Trip Type"]||"standard").toLowerCase();
  const tripType = tt.includes("complex")||tt.includes("multi")?"complex":"standard";
  const flagsRaw = f["Flags"]||"";
  const flags = flagsRaw?flagsRaw.split(/[,\n]/).map(s=>s.trim()).filter(Boolean):[];
  const pickup=f["Pickup Location"]||"", dropoff=f["Dropoff Location"]||"";
  const route = pickup&&dropoff?`${pickup} → ${dropoff}`:pickup||dropoff||"—";
  return {
    id:rec.id, customer:f["Customer Name"]||"Unknown", contact:f["Email"]||"—",
    phone:f["Phone"]||"—", school:f["School / Org"]||"—",
    category, status, assignee, tripType, flags, route,
    numBuses:f["Num Buses"]!=null?String(f["Num Buses"]):"—",
    date:f["Travel Date"]||"—", pickupLocation:pickup||"—", dropoffLocation:dropoff||"—",
    pickupTime:f["Pickup Time"]||"—", returnTime:f["Return Time"]||"—",
    passengers:f["Passengers"]||"—", numPassengers:f["Passengers"]||"—",
    vehicle:f["Vehicle Type"]||"—", amenities:f["Amenities"]||"",
    draftReply:f["AI Draft Reply"]||"", fullEmail:f["Original Email"]||"",
    received:formatReceived(f["Received At"]), ada:f["ADA Required"]||false,
    note:f["Notes"]||"", eventType:f["Event Type"]||"—",
  };
};
const fetchAll = async () => {
  let records=[], offset=null;
  do {
    const url = new URL(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}`);
    url.searchParams.set("pageSize","100");
    url.searchParams.set("sort[0][field]","Received At");
    url.searchParams.set("sort[0][direction]","desc");
    if (offset) url.searchParams.set("offset",offset);
    const res = await fetch(url.toString(),{headers:{Authorization:`Bearer ${getToken()}`}});
    if (!res.ok){const e=await res.json();throw new Error(e?.error?.message||`Error ${res.status}`);}
    const json=await res.json(); records=[...records,...(json.records||[])]; offset=json.offset||null;
  } while(offset);
  return records.map(mapRecord);
};

const isShortNotice = (s) => {
  if(!s||s==="—") return false;
  const p=s.split("–")[0].trim().split("/"); if(p.length<2) return false;
  const diff=(new Date(2026,parseInt(p[0])-1,parseInt(p[1]))-new Date())/(1000*60*60*24);
  return diff>=0&&diff<=7;
};

// ─── PIN Screen ───────────────────────────────────────────────────
function PinScreen({onUnlock}) {
  const [pin,setPin]=React.useState(""); const [shake,setShake]=React.useState(false); const [err,setErr]=React.useState(false);
  const tryPin=(v)=>{
    if(v===ACCESS_PIN){sessionStorage.setItem("ecl_auth","1");onUnlock();}
    else if(v.length===ACCESS_PIN.length){setShake(true);setErr(true);setTimeout(()=>{setShake(false);setPin("");setErr(false);},700);}
  };
  const handleKey=(k)=>{if(k==="DEL"){setPin(p=>p.slice(0,-1));return;}const next=pin+k;setPin(next);tryPin(next);};
  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <div style={{width:60,height:60,borderRadius:16,background:"#f59e0b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 14px",boxShadow:"0 4px 20px rgba(245,158,11,0.3)"}}>🚌</div>
        <div style={{fontSize:22,fontWeight:700,color:"#1e293b"}}>Charter Inbox</div>
        <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>Empire Coach Line · Sales Dashboard</div>
      </div>
      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:20,padding:"32px 40px",width:300,textAlign:"center",boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}}>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Enter your access PIN</div>
        <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:28,animation:shake?"shake 0.3s ease":"none"}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{width:16,height:16,borderRadius:"50%",background:i<pin.length?(err?"#ef4444":"#f59e0b"):"#e2e8f0",border:`2px solid ${i<pin.length?(err?"#ef4444":"#f59e0b"):"#e2e8f0"}`,transition:"all 0.15s"}}/>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {["1","2","3","4","5","6","7","8","9","","0","DEL"].map((k,i)=>(
            <button key={i} onClick={()=>k&&handleKey(k)} disabled={!k}
              style={{background:k==="DEL"?"#f1f5f9":k?"#fff":"transparent",border:k?"1px solid #e2e8f0":"none",borderRadius:12,padding:"16px 0",color:k==="DEL"?"#64748b":"#1e293b",fontSize:k==="DEL"?18:20,fontWeight:600,cursor:k?"pointer":"default",boxShadow:k&&k!=="DEL"?"0 1px 3px rgba(0,0,0,0.06)":"none"}}>
              {k}
            </button>
          ))}
        </div>
      </div>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}`}</style>
    </div>
  );
}

// ─── Token Setup ──────────────────────────────────────────────────
function TokenSetup({onSave}) {
  const [token,setToken]=React.useState(""); const [error,setError]=React.useState("");
  const handle=()=>{
    const t=token.trim();
    if(!t.startsWith("pat")||t.length<30){setError("Token should start with 'pat' and be much longer. Make sure you copied the full token.");return;}
    saveToken(t); onSave();
  };
  return (
    <div style={{minHeight:"100vh",background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:20,padding:40,width:460,boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24}}>
          <div style={{width:44,height:44,borderRadius:12,background:"#f59e0b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🚌</div>
          <div><div style={{fontSize:17,fontWeight:700,color:"#1e293b"}}>First Time Setup</div><div style={{fontSize:12,color:"#94a3b8"}}>Admin only · One time</div></div>
        </div>
        <div style={{fontSize:13,color:"#64748b",marginBottom:20,lineHeight:1.7}}>Paste your full Airtable Personal Access Token below. It's stored only in this browser — never in the code or on GitHub.</div>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.08em"}}>Airtable Token</div>
        <input type="password" value={token} onChange={e=>{setToken(e.target.value);setError("");}} placeholder="patXXXXXXXXXXXX.XXXXXXXXXXXXXXXXXXXXXXXX..."
          style={{width:"100%",background:"#f8fafc",border:`1px solid ${error?"#ef4444":"#e2e8f0"}`,borderRadius:10,padding:"11px 14px",color:"#1e293b",fontSize:13,outline:"none",marginBottom:8,fontFamily:"monospace"}}/>
        {error&&<div style={{fontSize:12,color:"#ef4444",marginBottom:10}}>{error}</div>}
        <button onClick={handle} style={{width:"100%",background:"#f59e0b",border:"none",borderRadius:10,padding:13,color:"#000",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:4}}>Save & Continue →</button>
        <div style={{marginTop:14,fontSize:11,color:"#cbd5e1",lineHeight:1.6}}>Get your token at airtable.com/create/tokens — needs data.records:read on Untitled Base.</div>
      </div>
    </div>
  );
}

            {/* Search */}
            <div style={{padding:"0 20px 8px"}}>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search customer, school, route..."
                style={{width:"100%",background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"9px 14px",color:"#1e293b",fontSize:13,outline:"none",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}/>
            </div>

            {/* Tabs */}
            <div style={{padding:"0 20px 10px",display:"flex",gap:4,overflowX:"auto"}}>
              {TABS.map(t=>(
                <button key={t.key} onClick={()=>setActiveTab(t.key)}
                  style={{background:activeTab===t.key?"#fff":"transparent",border:activeTab===t.key?`1.5px solid ${t.color}`:"1.5px solid transparent",borderRadius:20,padding:"5px 14px",color:activeTab===t.key?t.color:"#94a3b8",fontSize:12,fontWeight:activeTab===t.key?700:400,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:5,boxShadow:activeTab===t.key?"0 1px 4px rgba(0,0,0,0.08)":"none",transition:"all 0.15s"}}>
                  <span style={{fontSize:13}}>{t.icon}</span> {t.label}
                  <span style={{background:activeTab===t.key?t.color:"#e2e8f0",color:activeTab===t.key?"#fff":"#94a3b8",borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700}}>{counts[t.key]||0}</span>
                </button>
              ))}
            </div>

            {/* Record list */}
            <div style={{flex:1,overflowY:"auto",padding:"0 20px 20px"}}>
              {filtered.length===0&&<div style={{textAlign:"center",color:"#cbd5e1",fontSize:13,marginTop:40}}>No records in this view</div>}
              {filtered.map(r=>{
                const st=STATUS_CFG[r.status]||STATUS_CFG.new;
                const rep=getRep(r.assignee);
                const isSel=selected===r.id;
                return (
                  <div key={r.id} onClick={()=>setSelected(isSel?null:r.id)}
                    style={{background:"#fff",border:isSel?`2px solid #f59e0b`:"1px solid #e2e8f0",borderRadius:12,padding:"14px 16px",marginBottom:8,cursor:"pointer",boxShadow:isSel?"0 2px 12px rgba(245,158,11,0.12)":"0 1px 3px rgba(0,0,0,0.04)",transition:"all 0.12s"}}>
                    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:20,lineHeight:1}}>{r.category==="quote"?"🚌":r.category==="inquiry"?"💬":r.category==="operations"?"🔧":"🚨"}</span>
                        <div>
                          <div style={{fontSize:14,fontWeight:700,color:"#1e293b"}}>{r.customer}</div>
                          <div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>{r.school}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                        <span style={{fontSize:10,padding:"3px 10px",borderRadius:20,background:st.bg,color:st.color,fontWeight:700}}>{st.label}</span>
                        <span style={{fontSize:10,color:"#cbd5e1"}}>{r.received}</span>
                      </div>
                    </div>
                    {r.route&&r.route!=="—"&&<div style={{fontSize:12,color:"#64748b",marginBottom:3}}>📍 {r.route}</div>}
                    {r.passengers&&r.passengers!=="—"&&<div style={{fontSize:12,color:"#64748b"}}>👥 {r.passengers}{r.date&&r.date!=="—"?` · 📅 ${r.date}`:""}</div>}
                    {r.note&&<div style={{fontSize:12,color:"#94a3b8",marginTop:4,fontStyle:"italic"}}>"{r.note}"</div>}
                    <div style={{display:"flex",alignItems:"center",gap:5,marginTop:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,background:rep.color+"15",color:rep.color,padding:"2px 8px",borderRadius:10,fontWeight:700}}>★ {rep.name}</span>
                      {r.tripType==="complex"&&<span style={{fontSize:10,background:"#ede9fe",color:"#7c3aed",padding:"2px 8px",borderRadius:10}}>Multi-day</span>}
                      {r.ada&&<span style={{fontSize:10,background:"#fee2e2",color:"#dc2626",padding:"2px 8px",borderRadius:10,fontWeight:700}}>♿ ADA</span>}
                      {isShortNotice(r.date)&&<span style={{fontSize:10,background:"#fef3c7",color:"#d97706",padding:"2px 8px",borderRadius:10,fontWeight:700}}>⚡ Short Notice</span>}
                      {r.flags&&r.flags.length>0&&<span style={{fontSize:10,color:"#d97706",fontWeight:600}}>⚠ {r.flags.length} flag{r.flags.length>1?"s":""}</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Detail panel */}
          {selected&&selectedRecord&&(
            <div style={{flex:1,overflowY:"auto",padding:"24px 28px",background:"#fff"}}>

              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20}}>
                <div>
                  <h2 style={{fontSize:22,fontWeight:800,color:"#1e293b",margin:0}}>{selectedRecord.customer}</h2>
                  <div style={{fontSize:13,color:"#94a3b8",marginTop:3}}>{selectedRecord.school} · {selectedRecord.contact}</div>
                  <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                    {(()=>{const rep=getRep(selectedRecord.assignee);return <span style={{fontSize:11,background:rep.color+"15",color:rep.color,padding:"3px 12px",borderRadius:10,fontWeight:700}}>★ {rep.name}</span>;})()}
                    {selectedRecord.tripType==="complex"&&<span style={{fontSize:11,background:"#ede9fe",color:"#7c3aed",padding:"3px 12px",borderRadius:10,fontWeight:600}}>Multi-day / Complex</span>}
                    {selectedRecord.ada&&<span style={{fontSize:11,background:"#fee2e2",color:"#dc2626",padding:"3px 12px",borderRadius:10,fontWeight:700}}>♿ ADA Required</span>}
                  </div>
                </div>
                <button onClick={()=>setSelected(null)} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 14px",color:"#94a3b8",fontSize:12,cursor:"pointer"}}>✕ Close</button>
              </div>

              {/* Status bar */}
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
                    <span style={{fontSize:12,color:"#94a3b8"}}>Status</span>
                    <select value={selectedRecord.status} onChange={e=>handleStatus(selectedRecord.id,e.target.value)}
                      style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 12px",color:"#1e293b",fontSize:13,cursor:"pointer",flex:1,maxWidth:220}}>
                      <option value="new">New</option>
                      <option value="awaiting">Awaiting Info</option>
                      <option value="replied">Reply Sent</option>
                      <option value="ready">Ready to Quote</option>
                      <option value="sent">Quote Sent</option>
                      <option value="unqualified">Not Qualified</option>
                      <option value="spam">Spam / Scam</option>
                      <option value="forwarded">Forwarded</option>
                    </select>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    {!CLOSED.includes(selectedRecord.status)&&<button style={{background:"#f59e0b",border:"none",borderRadius:8,padding:"8px 18px",color:"#000",fontSize:13,fontWeight:700,cursor:"pointer"}}>Open in TBN →</button>}
                    {!CLOSED.includes(selectedRecord.status)&&<button onClick={()=>{setForwardNote("");setShowForward(true);}} style={{background:"#f0f9ff",border:"1px solid #7dd3fc",borderRadius:8,padding:"8px 14px",color:"#0284c7",fontSize:13,fontWeight:600,cursor:"pointer"}}>↪ Forward</button>}
                  </div>
                </div>
              </div>

              {isShortNotice(selectedRecord.date)&&(
                <div style={{background:"#fef3c7",border:"1px solid #fcd34d",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>⚡</span>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#d97706"}}>Short Notice — This Week</div><div style={{fontSize:12,color:"#92400e",marginTop:2}}>Prioritize quoting and follow-up immediately.</div></div>
                </div>
              )}
              {selectedRecord.ada&&(
                <div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>♿</span>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#dc2626"}}>ADA / Wheelchair Accessible Vehicle Required</div><div style={{fontSize:12,color:"#991b1b",marginTop:2}}>Confirm ADA vehicle availability before quoting.</div></div>
                </div>
              )}

              {selectedRecord.category==="quote"&&(
                <div style={{border:"1px solid #e2e8f0",borderRadius:12,marginBottom:16,overflow:"hidden"}}>
                  <div style={{padding:"10px 16px",borderBottom:"1px solid #e2e8f0",background:"#f8fafc"}}><span style={{fontSize:11,color:"#94a3b8",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600}}>Quote Details</span></div>
                  <div style={{padding:"14px 16px",borderBottom:"1px solid #f1f5f9"}}>
                    <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontWeight:600}}>Requestor</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 16px"}}>
                      {[["Name",selectedRecord.customer],["School / Org",selectedRecord.school],["Email",selectedRecord.contact],["Phone",selectedRecord.phone],["Event Type",selectedRecord.eventType]].map(([l,v],i)=>(
                        <div key={i}><div style={{fontSize:10,color:"#94a3b8",marginBottom:2}}>{l}</div><div style={{fontSize:13,color:v&&v!=="—"?"#1e293b":"#cbd5e1",fontStyle:!v||v==="—"?"italic":"normal"}}>{v||"—"}</div></div>
                      ))}
                    </div>
                  </div>
                  <div style={{padding:"14px 16px",borderBottom:"1px solid #f1f5f9"}}>
                    <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontWeight:600}}>Trip Details</div>
                    {[["Travel Date",selectedRecord.date],["Pickup Location",selectedRecord.pickupLocation],["Pickup Time",selectedRecord.pickupTime],["Destination",selectedRecord.dropoffLocation],["Return Time",selectedRecord.returnTime]].map(([l,v],i)=>(
                      <div key={i} style={{display:"grid",gridTemplateColumns:"130px 1fr",marginBottom:7}}>
                        <span style={{fontSize:12,color:"#94a3b8"}}>{l}</span>
                        <span style={{fontSize:13,color:v&&v!=="—"?"#1e293b":"#cbd5e1",fontStyle:!v||v==="—"?"italic":"normal"}}>{v||"—"}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:"14px 16px"}}>
                    <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:10,fontWeight:600}}>Vehicle & Passengers</div>
                    {[["No. of Buses",selectedRecord.numBuses],["Passengers",selectedRecord.numPassengers||selectedRecord.passengers],["Vehicle Size",selectedRecord.vehicle],["Amenities",selectedRecord.amenities||"None specified"]].map(([l,v],i)=>(
                      <div key={i} style={{display:"grid",gridTemplateColumns:"130px 1fr",marginBottom:7}}>
                        <span style={{fontSize:12,color:"#94a3b8"}}>{l}</span>
                        <span style={{fontSize:13,color:v&&v!=="—"&&v!=="None specified"?"#1e293b":"#cbd5e1"}}>{v||"—"}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {selectedRecord.flags&&selectedRecord.flags.length>0&&(
                <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
                  <div style={{padding:"10px 16px",borderBottom:"1px solid #fde68a",fontSize:11,color:"#92400e",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600}}>⚠ Flagged Issues</div>
                  {selectedRecord.flags.map((f,i)=>(
                    <div key={i} style={{padding:"10px 16px",borderBottom:i<selectedRecord.flags.length-1?"1px solid #fef3c7":"none",fontSize:13,color:"#92400e"}}>· {f}</div>
                  ))}
                </div>
              )}

              {selectedRecord.note&&(
                <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
                  <div style={{fontSize:11,color:"#94a3b8",letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:8,fontWeight:600}}>Summary</div>
                  <div style={{fontSize:13,color:"#475569",lineHeight:1.7}}>{selectedRecord.note}</div>
                </div>
              )}

              {selectedRecord.draftReply&&(
                <div style={{border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden",marginBottom:14}}>
                  <div style={{padding:"10px 16px",borderBottom:"1px solid #e2e8f0",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#f8fafc"}}>
                    <span style={{fontSize:11,color:"#94a3b8",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600}}>AI Draft Reply</span>
                    <button onClick={()=>{navigator.clipboard.writeText(selectedRecord.draftReply);setCopied(true);setTimeout(()=>setCopied(false),2000);}}
                      style={{background:copied?"#16a34a":"#fff",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 14px",color:copied?"#fff":"#64748b",fontSize:11,cursor:"pointer"}}>
                      {copied?"✓ Copied":"Copy"}
                    </button>
                  </div>
                  <div style={{padding:"14px 16px",fontSize:13,color:"#475569",lineHeight:1.9,whiteSpace:"pre-wrap",background:"#fff"}}>{selectedRecord.draftReply}</div>
                  {!approvedIds.includes(selectedRecord.id)?(
                    <div style={{padding:"12px 16px",borderTop:"1px solid #e2e8f0",display:"flex",gap:8,background:"#f8fafc"}}>
                      <button onClick={()=>setApprovedIds(p=>[...p,selectedRecord.id])} style={{background:"#16a34a",border:"none",borderRadius:8,padding:"10px 20px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",flex:1}}>✓ Approve & Send</button>
                      <button style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 20px",color:"#64748b",fontSize:13,cursor:"pointer",flex:1}}>✎ Edit First</button>
                    </div>
                  ):(
                    <div style={{padding:"12px 16px",borderTop:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:8,background:"#f0fdf4"}}>
                      <span style={{color:"#16a34a",fontWeight:700}}>✓</span>
                      <span style={{fontSize:13,color:"#16a34a",fontWeight:600}}>Reply sent to {selectedRecord.contact}</span>
                    </div>
                  )}
                </div>
              )}

              <div style={{border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden"}}>
                <div style={{padding:"10px 16px",borderBottom:"1px solid #e2e8f0",background:"#f8fafc",fontSize:11,color:"#94a3b8",letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600}}>Original Email</div>
                <div style={{padding:"16px",fontSize:13,color:"#64748b",lineHeight:1.9,whiteSpace:"pre-wrap",fontFamily:"Georgia,serif"}}>{selectedRecord.fullEmail||"No email body recorded."}</div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* Forward modal */}
      {showForward&&selectedRecord&&(
        <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowForward(false)}>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:16,padding:28,width:520,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:700,color:"#1e293b",marginBottom:4}}>↪ Forward to Manager</div>
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:20}}>Re: {selectedRecord.customer} — {selectedRecord.school}</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.08em"}}>To</div>
              <input value={forwardTo} onChange={e=>setForwardTo(e.target.value)} style={{width:"100%",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 12px",color:"#1e293b",fontSize:13,outline:"none"}}/>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.08em"}}>Subject</div>
              <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 12px",color:"#64748b",fontSize:13}}>FWD: {selectedRecord.customer} — {selectedRecord.school} [{selectedRecord.date}]</div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.08em"}}>Note (optional)</div>
              <textarea value={forwardNote} onChange={e=>setForwardNote(e.target.value)} rows={3} style={{width:"100%",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 12px",color:"#1e293b",fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
            </div>
            <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:"12px",marginBottom:16,fontSize:12,color:"#64748b",lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:150,overflowY:"auto"}}>{selectedRecord.fullEmail}</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setData(p=>p.map(r=>r.id===selectedRecord.id?{...r,status:"forwarded"}:r));setShowForward(false);setSelected(null);}} style={{flex:1,background:"#0284c7",border:"none",borderRadius:8,padding:11,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>↪ Send Forward</button>
              <button onClick={()=>setShowForward(false)} style={{flex:1,background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:8,padding:11,color:"#64748b",fontSize:13,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────
function App() {
  const [hasToken,setHasToken] = React.useState(()=>!!getToken());
  const [unlocked,setUnlocked] = React.useState(()=>sessionStorage.getItem("ecl_auth")==="1");
  if (!hasToken) return <TokenSetup onSave={()=>setHasToken(true)}/>;
  if (!unlocked) return <PinScreen onUnlock={()=>setUnlocked(true)}/>;
  return <Dashboard/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
